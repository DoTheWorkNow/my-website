<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>罗永浩的十字路口 · 播客精读</title>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<style>
:root{
  --bg:#0f1115; --panel:#161a21; --panel2:#1c212b; --ink:#e7e9ee; --ink2:#aeb6c2;
  --muted:#6f7889; --line:#262c38; --brand:#ff6a3d; --brand2:#ffb02e;
  --accent:#5b9dff; --green:#34d399; --pink:#f472b6; --quote:#2a3140;
  --maxw:860px; --side:320px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.78;
}
/* 顶部进度条 */
#progress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));z-index:100;transition:width .1s}
/* 布局 */
#app{display:flex;min-height:100vh}
#side{
  width:var(--side); flex:0 0 var(--side); background:var(--panel);
  border-right:1px solid var(--line); position:sticky; top:0; height:100vh;
  overflow-y:auto; padding:0; z-index:30;
}
#main{flex:1;min-width:0;display:flex;justify-content:center}
#content{width:100%;max-width:var(--maxw);padding:46px 40px 140px}
/* 侧栏 */
.brand{padding:22px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:5}
.brand h1{font-size:16px;margin:0;letter-spacing:.3px}
.brand .sub{color:var(--muted);font-size:12px;margin-top:4px}
.brand .count{color:var(--brand2);font-weight:600}
/* 分组标题 */
.nav-sec{padding:10px 0 4px;color:var(--muted);font-size:11px;letter-spacing:1px;padding-left:20px;text-transform:uppercase}
.gsec{display:flex;gap:11px;align-items:center;margin:16px 0 4px;padding:10px 16px 10px 17px;border-left:3px solid var(--gc)}
.gsec .gnum{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--gc);color:#1a1d24;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
.gsec .gt{font-size:13.5px;color:var(--ink);font-weight:700;letter-spacing:.3px}
.gsec .gs{font-size:11px;color:var(--muted);margin-top:1px}
/* 节目行 */
.ep{display:flex;gap:10px;align-items:flex-start;padding:9px 18px 9px 20px;cursor:pointer;border-left:3px solid transparent;transition:.15s}
.ep:hover{background:var(--panel2)}
.ep.active{background:var(--panel2);border-left-color:var(--gc,var(--brand))}
.ep .no{flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:800;font-size:12px;min-width:18px;height:18px;border-radius:50%;border:1.5px solid var(--gc,var(--brand));color:var(--gc,var(--brand));display:flex;align-items:center;justify-content:center;padding-top:0;margin-top:2px}
.ep.active .no{background:var(--gc,var(--brand));color:#1a1d24}
.ep .body{min-width:0;flex:1}
.ep .epno{display:inline-block;font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:0 5px;margin-right:6px;vertical-align:1px;font-variant-numeric:tabular-nums}
.ep .tt{font-size:13px;color:var(--ink2);line-height:1.4}
.ep.active .tt{color:var(--ink)}
/* 手风琴：当前篇就地展开章节 */
#nav{padding-bottom:30px}
.ep-toc{display:none;background:rgba(0,0,0,.22);border-left:3px solid var(--line)}
.ep-toc.open{display:block;padding:4px 0 12px}
.ep-toc a{display:block;padding:5px 16px 5px 50px;color:var(--muted);font-size:12.5px;text-decoration:none;border-left:3px solid transparent;margin-left:-3px;line-height:1.45;transition:.12s}
.ep-toc a:hover{color:var(--ink2)}
.ep-toc a.cur{color:var(--brand2);border-left-color:var(--brand2);background:var(--panel2)}
.ep .caret{margin-left:auto;color:var(--muted);font-size:11px;transition:.2s;flex:0 0 auto;padding-top:3px}
.ep.active .caret{transform:rotate(90deg);color:var(--gc,var(--brand))}
/* 顶部信息卡 */
.hero{background:linear-gradient(135deg,#1d2330,#161a21);border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-bottom:30px;position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,var(--hc,rgba(255,106,61,.18)),transparent 70%)}
.hero .eyebrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;letter-spacing:1px;font-weight:600}
.hero .cattag{background:var(--hc);color:#1a1d24;padding:3px 10px;border-radius:6px;font-weight:800;letter-spacing:.5px}
.hero .rank{color:var(--hc);border:1px solid var(--hc);padding:2px 9px;border-radius:20px;font-size:11px}
.hero .epid{color:var(--muted);font-weight:500;letter-spacing:1px}
.hero h2{font-size:25px;margin:10px 0 4px;line-height:1.3}
.hero .theme{color:var(--ink2);font-size:15px}
.hero .why{margin-top:14px;padding:11px 14px;background:rgba(255,255,255,.04);border-left:3px solid var(--hc);border-radius:0 10px 10px 0;color:#ffe6c4;font-size:13.5px;line-height:1.65}
.hero .why b{color:var(--hc)}
.hero .chips{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);font-size:12px;padding:4px 11px;border-radius:20px}
.chip b{color:var(--ink);font-weight:600}
/* 正文排版 */
#doc h2{font-size:21px;margin:42px 0 14px;padding-top:14px;border-top:1px dashed var(--line);scroll-margin-top:20px;position:relative;padding-left:14px}
#doc h2:before{content:"";position:absolute;left:0;top:18px;bottom:2px;width:4px;border-radius:3px;background:linear-gradient(var(--brand),var(--brand2))}
#doc h2:first-child{border-top:none;margin-top:0}
#doc h3{font-size:16.5px;margin:26px 0 10px;color:var(--brand2)}
#doc p{margin:13px 0;color:var(--ink)}
#doc strong{color:#fff}
#doc ul,#doc ol{padding-left:24px}
#doc li{margin:7px 0}
#doc a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(91,157,255,.3)}
#doc hr{border:none;border-top:1px solid var(--line);margin:30px 0}
#doc code{background:#222835;padding:2px 6px;border-radius:5px;font-size:.88em;color:var(--brand2)}
/* 引用 / 金句 */
#doc blockquote{margin:16px 0;padding:14px 18px;background:var(--quote);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;color:var(--ink2)}
#doc blockquote p{margin:6px 0;color:var(--ink2)}
/* 萃取卡片 */
#doc blockquote.insight{background:linear-gradient(135deg,rgba(255,176,46,.12),rgba(255,106,61,.06));border-left:3px solid var(--brand2)}
#doc blockquote.insight p{color:#ffe6c4}
#doc blockquote.insight strong{color:var(--brand2)}
/* 表格 */
#doc table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px;overflow:hidden;border-radius:10px}
#doc th{background:var(--panel2);color:var(--ink);padding:10px 12px;text-align:left;border-bottom:2px solid var(--brand)}
#doc td{padding:10px 12px;border-bottom:1px solid var(--line);color:var(--ink2)}
#doc tr:hover td{background:rgba(255,255,255,.02)}
/* 任务清单 */
#doc li.task{list-style:none;margin-left:-22px;padding-left:0}
#doc li.task input{margin-right:9px;width:15px;height:15px;accent-color:var(--brand);vertical-align:-2px}
/* mermaid 容器 */
.mwrap{margin:28px 0;background:linear-gradient(180deg,#ffffff,#f5f7fb);border:1px solid #e5e9f1;border-radius:18px;padding:24px 20px;text-align:center;position:relative;overflow-x:auto;box-shadow:0 10px 34px rgba(0,0,0,.30)}
.mwrap::-webkit-scrollbar{height:9px}
.mwrap::-webkit-scrollbar-track{background:#eef1f6;border-radius:5px}
.mwrap::-webkit-scrollbar-thumb{background:#c4ccda;border-radius:5px}
.mwrap .cap{position:absolute;top:12px;left:18px;font-size:11px;letter-spacing:1px;color:#9aa3b4;font-weight:600}
.mwrap .mtools{position:absolute;top:10px;right:12px;display:flex;gap:6px;opacity:0;transition:.2s;z-index:2}
.mwrap:hover .mtools{opacity:1}
.mwrap .mtools button{background:#fff;border:1px solid #d8dde6;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;color:#475569;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.mwrap .mtools button:hover{border-color:var(--brand);color:var(--brand)}
.mermaid{display:inline-block;vertical-align:top}
.mermaid svg{height:auto!important;max-width:none}
/* 顶栏小工具（移动端切换） */
#topbar{display:none}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
/* 浮动「下一篇」 */
#nextbar{position:fixed;right:26px;bottom:24px;z-index:40;display:flex;gap:10px}
#nextbar button{background:var(--brand);color:#fff;border:none;border-radius:24px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(255,106,61,.35)}
#nextbar button.prev{background:var(--panel2);color:var(--ink2);box-shadow:none;border:1px solid var(--line)}
/* 响应式 */
@media(max-width:980px){
  #side{position:fixed;left:0;top:0;transform:translateX(-100%);transition:.25s;box-shadow:6px 0 30px rgba(0,0,0,.5)}
  #side.open{transform:translateX(0)}
  #topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;background:rgba(15,17,21,.9);backdrop-filter:blur(8px);padding:12px 16px;border-bottom:1px solid var(--line);z-index:25}
  #topbar .now{font-size:14px;color:var(--ink2)}
  #content{padding:20px 18px 120px}
  .hero h2{font-size:21px}
  #nextbar{right:14px;bottom:14px}
}
/* mermaid 文字微调 */
.mermaid .nodeLabel,.mermaid .edgeLabel{font-family:"PingFang SC","Microsoft YaHei",sans-serif!important}
</style>
</head>

</div>

  <button id="nextBtn">下一篇 →</button>

<script id="data" type="application/json">[{"id": "13_陈冕_AI创业与Lovart的全球突围", "num": "13", "name": "陈冕 · AI创业与Lovart的全球突围", "theme": "AI创业与Lovart的全球突围", "guest": "陈冕（Lovart/LiblibAI 创始人）、罗永浩", "issue": "13", "duration": "03:43:42", "cat_key": "core", "cat_idx": "一", "cat_title": "直指核心战役", "cat_sub": "AI · 创业 · 管理", "cat_color": "#ff6a3d", "rank": 1, "reason": "AI课产品的作战手册：认知×速度×信念 + 只做大厂看不上、不敢信的事；裸辞→差点倒闭→全球爆款的完整决策链。", "md": "## 一句话总结\n\n十年集齐大厂、却从未真正\"赢过\"的产品经理，把 AI 当救赎裸辞创业，靠\"认知×速度×信念+只做大厂看不上、不敢信的事\"，把 Lovart 做成全球爆款。\n\n## 整体地图\n\n```mermaid\nflowchart TB\n    Origin[\"少时漂泊·住校·游戏少年<br/>无故乡 → 终生焦虑<br/>想赢·讨厌 follow\"]\n    Origin --> Decade[\"十年大厂<br/>BAT天地除阿里全去过<br/>每场商战的亲历样本\"]\n    Decade --> Dark[\"至暗时刻<br/>移动互联网过去了<br/>以为这辈子没机会创业\"]\n    Dark --> AI[\"AI 是救赎<br/>2023.5 裸辞<br/>Timing is everything\"]\n    AI --> Liblib[\"Liblib<br/>设计师的 AI 工具<br/>差点倒闭(账上剩4000)\"]\n    Liblib --> Lovart[\"Lovart (2026)<br/>每个人的 AI Designer<br/>一上线就爆·全球突围\"]\n    Lovart --> Method[\"方法论沉淀<br/>上下游·新人群·壁垒·赌AGI不来\"]\n    Method --> Vision[\"终极愿望<br/>让世界内容更丰富<br/>大闹一场·悄然离去\"]\n\n    style Origin fill:#e5e7eb,stroke:#6b7280\n    style Decade fill:#dbeafe,stroke:#2563eb\n    style Dark fill:#fee2e2,stroke:#dc2626,stroke-width:2px\n    style AI fill:#fef3c7,stroke:#d97706,stroke-width:3px\n    style Liblib fill:#fef3c7,stroke:#d97706\n    style Lovart fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n    style Vision fill:#fce7f3,stroke:#be185d\n```\n\n---\n\n## 一、原生底色：漂泊、想赢、讨厌跟随\n\n陈冕重庆涪陵人，父母都是大学老师，父亲读研读博期间家里穷、母亲打工养家，陪伴不足。从小学起辗转涪陵→达州→重庆→南京→深圳→北京，**没有一个\"家乡\"概念**。初中起住校，户口在成都却从没住过。\n\n> \"如果我不往前走，我会不知道我要去哪。\" — 陈冕谈焦虑的来源：没有可失去的，也没有可回去的。\n\n高中进了一年考 30 多个清北的\"清北班\"，因为沉迷 Dota、想走计算机奥赛保送捷径，成绩从初中\"全市第一\"掉到班里倒数十几名，**被淘汰进了\"复读+被淘汰生\"组成的新班**，高三冲刺几十分考上东南大学，专业是\"信息管理\"——他自己选的\"人文×计算机的交叉\"。\n\n性格上是天生的 leader：初中当\"网管\"组织同学看魔兽录像换社会地位（罗永浩：\"很早就会用手头资源换取社会地位\"）、大学装裤子破逃军训去做宣传队海报。MBTI 从 ENTJ 创业后变成 ENTP（\"创业之后 J 不了一点\"）。\n\n大学专业\"信息管理\"是他自己选的\"理想专业\"——\"喜欢计算机但不想写代码，搞计算机奥赛搞不过别人，发现自己是人文和科技的交叉\"。但去了发现\"计算机的东西我高中奥赛就学完了太浅、管理的事课堂不如辩论赛/创业比赛/挑战杯学得多\"，于是大一大二起基本不上课（学院开明，做辩论赛可以请假）。他认同罗永浩转述丁兆中的话——\"**一个好的大学首先是允许逃课的大学**……它是自由的平台，这是我感谢大学的地方\"。他不沉沦是因为\"白天没人陪我打游戏（都是网游/刀塔要一起打才过瘾），被迫干了点正事，发现那些正事也挺快乐的——我只是白天不喜欢上课，不是不喜欢玩别的\"。\n\n关于\"缺乏安全感\"，他澄清更准确的是\"**焦虑**\"而非缺安全感，但承认童年陪伴不足（小学时父亲在读研读博、母亲打工）的影响：\"童年陪伴不足对大部分人会有伴随终生的焦虑，可能显性也可能隐性。\"为追当时的女友（也定了\"一定要在一起、至少不能离太远\"）从深圳腾讯追到北京 360，他自认这正是\"没有安全感、焦虑\"的体现。罗永浩点出一个关键：陈冕属于\"激素分泌水平天生略高一点\"的人，**普通人微微嗨时是他的常态**，这在创业上是天生赢家特质。陈冕公司头像是个小太阳。\n\n> \"我很讨厌 follow，就很讨厌跟随……我希望让自己有影响力，这确实是我的一个动力。\"\n\n罗永浩借此展开一段进化心理学的\"野心从哪来\"假说（他强调是专业研究者的假说而非民科）：\n\n- 胎儿在娘胎里**营养供得特别足**时，会\"进化出更大的野心\"——因为这预示出生后家境不差，\"那我得干更大的事\"；反之营养不足，基因会调配让个体\"长得更好看 / 形成谨小慎微的性格\"以适应残酷世界\n- 多子女家庭里小的往往更淘气、更有安全感——因为动物本能偏爱更需要照顾的幼崽\n- 由此引出\"为什么有人能力很强却老觉得自己不行、有人能力和野心刚好匹配、有人能力不够野心很大\"——**很多是天生的**\n\n陈冕的回应很\"AI 原住民\"：\n\n> \"这个如果搞明白了，应该 AI 也会变强。现在 AI 就是不知道怎么让它有个性、有情绪、有想法、有追求。\"\n\n陈冕也辩证看待\"小城市出身\"：他一度后悔\"没出生在更小的城市/农村，否则能看到中国全貌、做产品更懂下沉市场\"，但最终结论是\"**待过的不同城市是一个优质的数据集**（用 AI 的角度讲），核心还是要想赢、过好自己的未来\"。\n\n> 💡 **萃取：**\"无根的焦虑\"可以是一种持续向前的燃料——当一个人没有退路（没有可回去的地方），\"往前走\"就从选择变成了唯一解。\n\n---\n\n## 二、十年大厂：一份被妖魔化为\"乱跳槽\"、实则刻意收集样本的履历\n\n陈冕被外界戏称\"集齐了中国移动互联网的龙珠\"——**BAT天地（百度/阿里/腾讯/头条/滴滴）除阿里外全去过**，加摩拜、每日优鲜、字节，十年跳了七八次。一个高阶同学一度因为\"你跳槽跳太多了，觉得你不靠谱\"而拒绝加入。\n\n他的复盘是：每一次跳槽的底层逻辑是同一个**目标——\"成为引领者和决策者，自己做点事改变世界\"**，而不是\"在一家公司好好做一件事\"。如果是后者，这履历就废了，没 HR 敢要；如果终点是创业，**过去跳多少次槽都不重要，重要的是攒下了\"亲历每一场商战、每一个阶段\"的样本**。\n\n履历的关键节点与教训：\n\n| 阶段 | 公司/项目 | 核心收获 / 教训 |\n|---|---|---|\n| 大二 | 中国版 GitHub 创业 | 第一次听说\"产品经理\"；明白**程序员社区没有国界，中国不可能有 GitHub** |\n| 实习 | 腾讯 | 假装校招混进去；好公司、强产品基因 |\n| 6+6月 | 360 | 为追女友去北京（焦虑/没安全感的体现） |\n| 3个月 | 百度 | 第一次理解什么叫\"**技术驱动**\"——产品经理说话没技术好使，不适合自己 |\n| 1年8月 | 滴滴 | 第一次打\"补贴战\"；但**产品经理不起决定作用**；至暗——老板天天说\"你不行\" |\n| 2年 | 摩拜 | 理解 O2O 本质=找车修车降本增效；**为理想主义放弃美团股票（差9个月没满锁定期，错过翻10倍）** |\n| ~1年 | 每日优鲜 | 做了\"砍一刀\"裂变，**一个测试链接一夜进 20 万用户**——人生第一次 reward model 转正 |\n| 3.5年 | 字节（瓜瓜龙→剪映CapCut） | 0→1 做起瓜瓜龙成最年轻\"四杠一\"之一；把剪映从无收入做成订阅制商业化 |\n\n滴滴时期是高中后最难受的低谷：努力却被老板反复说\"不行\"，还被拿\"新招的人比你优秀很多\"打压（事后发现那人也没更强）。这段\"较劲\"被他记了很久。罗永浩对此批评那位上司：\"教的是个狗屎，但你不能说这个人不行。\" 陈冕的成熟之处在于：\"事儿不行很正常，最伤的是说有个人比你优秀很多、你好好学习。这件事会记在我心里、会较劲，但我并不是要报复他。\"\n\n**字节是创业前最重要、最满足的一段**：\n- 2020 年初进字节做教育\"瓜瓜龙\"（动画录播课），选教育+录播课的理由是\"19 年底纯线上软件赛道已被做完，要找还在风口又纯线上属性重的，就是教育录播课\"\n- 瓜瓜龙巅峰上万人（含辅导老师），陈冕带 100 多人产品团队，0 到 1 做起来，\"我真的成为决策者了，虽然不是一号位\"——**这是他打工生涯最满足、最想闯的状态**，也是\"为什么前面一直跳槽（因为没到想要的状态）\"的反证\n- 是字节历史上最年轻的\"四杠一\"高管之一（罗永浩有字节朋友熬到中年好几次差点四杠一没成）\n- 双减关停瓜瓜龙是\"沉重打击\"；之后调去剪映/CapCut，把一个\"服务抖音、无收入、不是独立业务\"的影像功能**做成独立订阅制业务**（依托工具+模板/素材内容付费，\"贴纸花字是不断更新的，每月收费更讲道理\"）\n\n罗永浩补充了\"战斗型 CEO\"的来源辨析：陈冕骨子里喜欢战斗，又叠加了亲历每场商战的强化。更关键的是那个\"激素水平\"洞察——陈冕\"经常在办公室兴奋大叫\"、公司头像是个小太阳、\"希望一直这样\"。罗永浩：\"你们这种人要明显外人看得出沮丧，得是比别人遭受好几倍打击才会，这对团队有特别好的振奋作用，而且你还没刻意额外做任何事。\"\n\n> \"出来混最重要是不是还是得出来\" / \"Timing is everything。\" — 关于机会 vs 准备好的纠结。\n\n几段细节值得保留：\n\n- **百度只待 3 个月**：想做\"连接千行百业\"，挤进直达号团队（手机百度里的\"微信公众号\"），但\"百度不是强产品基因的公司，那个阶段不适合产品经理出身的人\"。罗永浩补了个微软的同构案例——工程师文化公司里设计师是\"美工\"，工程师当面叫设计师来\"把这个按钮给我改一下\"，从一堆参考里挑最丑的，设计师一脸怨气走人。\n- **摩拜看清 O2O 本质**：摩拜/ofo 生意本质就是\"把车一丢，然后找车修车\"，C 端就是扫码开锁、在微信里就扫了、甚至不需要 App——**赢的不是用户体验最好的，是规模效应和财务账算得过来的**（易到体验最好却输给规模）。\n- **每日优鲜的\"reward model 第一次转正\"**：他独立设计的\"砍一刀\"裂变，一个**还没上线的测试链接被分享出去，第二天早上一来 20 万用户进来了**。\"那一刻对我成就感和自信心的建立很强……前面我都是局外者，不知道我自己做事能不能真的成功。\"他用 AI 术语自比：\"这其实就是 reward model，你终于发现把每件事做到极致是可以把事做成的。\"\n- **滴滴低谷的\"较劲\"**：老板招了个同岗位的人说\"这人比你优秀很多、你好好学习\"，他认真研究后觉得\"大家差不多\"，从此内耗但\"这件事会记在心里、会较劲\"。罗永浩评：\"较劲是好事。\"\n\n> \"我经历了几乎中国互联网移动互联网的多场知名战争……我几乎打了每一场仗，知道他们谁会赢谁会输、为什么、里面发生了什么。\" — 这是他眼中最重要的资产。\n\n```mermaid\ntimeline\n    title 陈冕事业 timeline（漂泊 → 大厂样本 → 至暗 → AI 救赎 → 全球突围）\n    2012-2014 : 大二做\"中国版GitHub\"创业 : 腾讯实习 : 第一次听说\"产品经理\"\n    2014-2016 : 360→百度(3月)→滴滴 : 打第一场补贴战 : 滴滴低谷\"被说不行\"\n    2016-2019 : 摩拜(2年)→每日优鲜 : 看清O2O本质 : \"砍一刀\"reward首次转正\n    2020-2023 : 字节 瓜瓜龙→剪映CapCut : 最年轻四杠一之一 : 双减关停·至暗时刻\n    2023.5 : ChatGPT冲击·裸辞 : \"≥电脑发明\" : Timing is everything\n    2023-2024 : Liblib上线·濒临倒闭 : 账上剩4000 : 骨干筑底活过死亡线\n    2026 : Lovart启动并引爆 : 一上线就爆·全球突围 : 现金流转正\n```\n\n> 💡 **萃取：**一份履历是\"乱\"还是\"刻意\"，取决于背后有没有一个不变的元目标。用终局倒推，单次选择的对错会被熨平，加总后反而成了别人没有的不可替代资产。\n\n---\n\n## 三、\"AI 是救赎\"：为什么裸辞，以及为什么是图像\n\n2021–2022 是陈冕的至暗时刻：瓜瓜龙因双减关停、移动互联网\"十年过去了\"、22 年资本市场最冷、连投资人都没来 cover 他。他内耗两件事：一是\"之前为什么瞎跳槽\"，二是\"为什么我不去创业\"（之前觉得没 ready，做完瓜瓜龙觉得 ready 了却没机会了）。他甚至上升到\"我还有机会 0 到 1 做出一个伟大的事情吗？应该也没有了\"的绝望，怀疑\"下一个技术革命会不会等着我的是十几年后\"。\n\n罗永浩用自己做 AR 的经历完整共情：第一次想退休是直播还债差不多后，觉得人生还能做最后一个大事（汽车已耽误），AR 调研大半年、跑遍供应链发现元器件指标比几年前有 300%-500% 提升很兴奋，但**真打出原型机才发现\"原来太差了，你是 1000% 的提升，它离真正替代手机成为计算平台还是遥遥无期\"**——于是第二年想\"把钱退给股东把公司关了\"，结果第二年 AI 来了。他对 Web3/元宇宙的判断也很犀利：\"元宇宙是错判（技术不够，且我们为什么要带个设备去一个完全虚拟、没下半身、卡通幼稚的世界）；Web3 我是真没敢碰——**你接触 10 个人，9 个半是骗子的时候，就有点怪，你都懒得去塞那 0.5 了**。\"\n\n转折是连续两次冲击：先是 Midjourney/Stable Diffusion（22 上半年图还很丑，年底\"突然怎么这么好了\"），紧接着 ChatGPT。\n\n> \"那一瞬间你的反应是，我一定做错了什么？我一定判断错了，我一定不知道它发生了什么。\"\n\n他研究几个月后定性：**\"它至少是电脑的发明，不会小于电脑发明；移动互联网只是互联网的第二波。\"** 于是 2023 年 5 月裸辞——又一次放弃字节最后一年最多的期权（差半年没要）。决策中有个动人巧合：就在 ChatGPT 出来前，他刚发了条饭否/即刻自我安慰\"我要提升表达欲、多学多看多说话，这样可能开心一点\"（因为觉得没机会创业），结果\"刚说完那两件事就发生了\"——\"我当时就想，难不成机会来了？难不成我刚要提升表达欲就没机会提升、必须埋头干活了？有这么好的事啊？\"\n\n> \"我说希望（AI）是一切痛苦的解药，是一切痛苦的意义——我之前所有的痛苦第一能被解决，第二也是我那些沉淀的意义，我跳了七八次槽积累那么多样本，如果没有机会发挥就没有意义了。\"\n\n两个外部催化：**王慧文天天在朋友圈发\"英雄帖\"**（\"心在被挠……虽然后来他因身体关系很遗憾不能亲自参与，但对我影响很大\"）、以及十年样本沉淀逼出的本能反应。他强调 timing 的不可替代性：\"做图类或通用的 agent，你不在 24 年之前出来就没机会了——硅谷公司基本 22 年、国内 23 年或连续创业者。完全从大厂出来你团队、资金、市场 credit 都没有，必须在爆发前一两年筹备才来得及。\"\n\n**为什么选图像/多模态而非通用对话**：\n\n- 通用大模型/入口/基座是巨头必争之地，\"我打过那么多场仗，知道跟巨头硬碰硬是什么下场\"（360 手机助手战场之惨）\n- 多模态**更垂直、不像入口、不跟巨头硬刚**\n- 数字内容的**生产端比消费端来得更早**\n- 工具赛道里\"用户多 ≠ 收入高 ≠ 公司值钱\"——Adobe 最赚钱、剪映用户最多，要的是**价值最大化而非用户量迷信**\n\n> \"天生我材必有用……但这个后面吃了大亏。\" — 自信\"业务做好就一定能融到钱\"是错的认知。\n\n> 💡 **萃取：**对量级的判断决定行动半径——把一件事判成\"互联网级\"还是\"电脑发明级\"，会直接改变你愿不愿意放弃确定的期权去赌它。判断量级，比判断方向更上游。\n\n```mermaid\nflowchart LR\n    Shock1[\"Midjourney/SD<br/>(2022 图很丑→突然变好)\"] --> Shock2[\"ChatGPT<br/>(像真的能思考)\"]\n    Shock2 --> Judge{这是哪一层?}\n    Judge -->|不是移动互联网| Size[\"≥ 电脑的发明<br/>(可能是电/工业革命)\"]\n    Size --> Quit[\"2023.5 裸辞<br/>放弃字节最大期权\"]\n    Quit --> Pick[\"选图像/多模态<br/>避巨头·垂直·生产端先行\"]\n\n    style Shock1 fill:#dbeafe,stroke:#2563eb\n    style Shock2 fill:#dbeafe,stroke:#2563eb\n    style Size fill:#fef3c7,stroke:#d97706,stroke-width:2px\n    style Quit fill:#fee2e2,stroke:#dc2626\n    style Pick fill:#dcfce7,stroke:#16a34a\n```\n\n---\n\n## 四、Liblib 的生死劫：账上剩 4000 块\n\n第一代产品 Liblib 是几个朋友自掏腰包、技术纯外包做起来的\"设计师的 AI 工具\"，没上线就有 VC 主动给钱。但陈冕在投融资上连环踩坑，几个月就差点倒闭：\n\n- **估值低**：自己不知道市场行情、没人告诉他、也没顾问，心思全在产品上\n- **一来进太多家**：当时觉得\"雨露均沾、朋友多好办事\"，结果**把有钱的都进了，下一轮谁来投？困难时可选择面又少**\n- **资本寒冬反而该多囤钱**，却因连续融资没做好导致现金流吃紧\n- 一个**比他有钱的竞品对着他烧补贴**（卡补贴+运营补贴，当时完全不收费）\n\n最惨时最后六个月只有 100 多万人民币，有报道说账上一度只剩 4000 块（次日投资款才到账）。但他很\"刚\"：极限运作下两个月现金流能转正，大不了自己掏钱顶两个月；面对\"为什么不卖/为什么裁员\"的内外压力，他认定\"没钱就找钱\"，从没想过卖。\n\n> \"创业就是把自己的长板发挥到极致，然后通过长板换得的成功，再去补自己的短板，不管是钱还是人。\"\n\n融资踩坑的细节也值得记：第一个投资人\"纯粹是因为人\"——没产品就给打 100 万美金（对人的判断）；后面的投资人是产品上线后增长极快（瞬间几万 DAU、核心用户很热爱），\"他虽然不懂，但觉得有人很热爱、估值又便宜，那肯定值得那点钱\"。陈冕对融资的态度暴露了非典型创业者的弱项：**\"我不知道市场是什么估值、没人告诉我、心思全在产品上、也没遇到靠谱的、我讨厌多人社交（除非一对一聊产品）\"**。罗永浩借此感慨李想自评\"融资能力是负分、必须靠业务硬走出来\"，以及\"有的人现金融了 1000 亿都烧掉还能融到钱，真是超人\"——**融资是一种独立的、严肃的能力**。\n\n正因创始人不是技术出身，所以**第一件事必须选\"运营/产品驱动\"而非技术驱动**，技术哪怕外包也行——这是\"长板优先\"的必然推论。\n\n稳团队的真相也很坦诚：危机时不是打满鸡血，而是\"**让大家都筑底就好了，别走到只剩我一个人**\"，靠少数听得懂道理的骨干撑过去。\"那个时间点就那么关键的一两个同学在 deliver 产出，其他人是没办法干活的——势头不好时它会从事到钱到人连环攻击你。\" 罗永浩补了个锤子科技的同构案例（\"上手段\"）：低谷期他本想让大家别加班歇一歇，结果 CTO 发现**不能让工程师闲下来**——\"把每天要完成的代码量堆得满满的，他就顾不上想；一闲下来就凑在一起吃饭喝茶聊'公司还有没有前途、是不是该看别的机会'，连手头清闲的活都开始质疑要不要做了\"。于是有过荒唐的三个多月，没什么着急的事也让大家忙得焦头烂额，**因为情绪传染比什么都快**。陈冕认同：\"经历过起伏和周期，也更容易筛选同行者了——不是走了人就不好，只是谁更适合同行。\"\n\n> 💡 **萃取：**初创公司最致命的不是产品差，而是\"长板偏科\"——把全部精力压在最强项（产品）上、对融资/现金流这种\"短板综合能力\"零经营，会让一个好产品死在节奏上。\n\n```mermaid\nstateDiagram-v2\n    [*] --> 自信裸辞: \"业务做好就能融到钱\"\n    自信裸辞 --> 估值偏低: 不懂行情·没顾问\n    估值偏低 --> 一次进太多家: 雨露均沾\n    一次进太多家 --> 现金流吃紧: 没连续融资\n    现金流吃紧 --> 竞品烧补贴: 对手更有钱\n    竞品烧补贴 --> 濒临倒闭: 账上剩4000\n    濒临倒闭 --> 骨干筑底: 不卖·找钱·骨干撑\n    骨干筑底 --> 活过死亡线: 现金流可两月转正\n    活过死亡线 --> [*]\n```\n\n---\n\n## 五、Lovart：从\"设计师的工具\"到\"每个人的 AI Designer\"\n\nLovart 2025 年底–2026 年初启动，是 Liblib 的范式跃迁：\n\n- **Liblib**：还是让**设计师换一个 AI 工具**（原工具 + AI 工具混用），门槛仍高，服务的是专业创作者\n- **Lovart**：是\"**每个人的 AI Designer**\"，让**甲方/做 marketing/提需求的人直接用**——它\"未来确实会取代一部分设计师\"\n\n核心产品理念只有一句**最底层的话**：**还原\"人和人类设计师\"的协作方式**。\n\n- 既然甲方和 AI 设计师交流应该像和真人设计师交流，那就一定需要**无限画布**（盛放作品、做视觉对齐），而不是只对着聊天框\n- 上了 `Touch Edit`（`Chat Canvas` 升级版）：你指着画面某处，AI 借图像理解能力知道\"你说的是这个杯子吧\"——**因为人跟设计师沟通本来就要用手比划**\n- 假设：\"模型会越来越聪明，但最聪明也先超不过人。那就构想人跟人怎么沟通，照着做就不会错。\"\n\n罗永浩用自己当年 TNT(Touch and Talk) 的设计共鸣完整展开：在没有 AI 的语音交互时代，对着满屏多个窗口用嘴说\"改这个\"有\"一万个、十万个可能性\"，但**用手指住一个特定区域，这一万个可能性瞬间收窄到十几个**——再把这十几个对应成传统右键菜单，正确率能做到 90%。\"我们在鸟巢演示出丑被全国嘲笑的那个 TNT，在办公室 demo 正确率奇高，问题出在露天声音通过 speaker 传出去再回到麦克风。\" 同一个\"指 + 说\"的底层直觉，十年后在 Lovart 的 Touch Edit 上复现了。\n\n陈冕还讲了\"为什么不做更通用、更大众的图像产品\"的完整推理（罗永浩反复追问\"为什么不做老百姓每天玩的、装机量瞬间上千万的好玩点子\"）：\n\n> \"你的目标是做一个最多用户用的产品，还是一个成功的业务？全世界最赚钱的工具是 Adobe，但用户最多的工具是剪映……在内容这个行业，本质上是谁能产生最高价值的内容谁最值钱，而不是谁产生的内容量最大谁最值钱。\"\n\n- 要做的是\"**可留存的真需求**\"，不是\"火一波然后卖掉\"的好玩点子（如\"输入一张脸生成你从小学到大学各阶段的相册\"——聪明好玩但两三个月就没人玩）\n- \"我是一个产品人，我要做的是**通用的产品**（指跨行业的某种模态/题材），而不是垂直（指按行业切分，如专门服务电商换装）\"——\"这世界上最知名的 To C 产品都不是服务电商的，它的切分方式不是按行业切分的\"\n- 数字内容的**生产端比消费端来得更早**\n\n工程上一个反直觉点：**无限画布如今工程量没那么大了**——因为\"模型的 scaling 摧毁了上一代软件的工程壁垒\"（Adobe 时代纯靠工程量堆，现在大部分价值模型已实现，在 web 层\"套层皮\"，但这层皮影响交互依然重要）。\n\n辟谣\"设计师主导产品\"：**仍有产品经理**，只是设计师重要性变重，因为**设计师贡献的是审美**——\"如果这个产品没有审美，它就不是一个好的 AI 设计师\"。整个 Lovart 公司约 50–60 人，产品经理和设计师各不到 10 个。\n\n罗永浩对 Lovart 有一段精彩的\"产品本质\"剖析，值得完整保留——它处在\"超级缝合怪\"和\"AI native\"的中间模糊态：\n\n- **缝合怪视角**：它整合了大量旧世界元素（画布、图层、编辑）+ 接入所有最好的模型（这家擅长这个、那家擅长那个），重新排列组合后\"比旧世界又快又好、学习成本又低\"。缝合怪在这里是中性的——**只要实现了价值，超级缝合怪也是了不起的东西**。\n- **AI native 视角**：每个元素旧世界都有（除了 AI），但重新组合后能生成\"原来绝对做不到的东西\"。\n\n陈冕给出\"什么是 AI native\"的硬定义，并强调**不要教条理解**：\n\n> \"没有这个能力，你这个体验就不存在——而不是打折，那才是 AI native。Notion 加文字处理，本身 Notion 就实现了体验，AI 把它从 60 分做到 80 分，那你打得过它吗？这本质上就不是 AI native 的需求，你干嘛去跟 Notion/飞书竞争？\"\n\n他还纠正了\"画布是旧事物\"的误解：\"为什么要有画布？因为**屏幕是画布**。屏幕这个旧事物没有被改变——如果设备变成眼镜，那就是'镜布'不是画布了。AI 应用也是长在手机/电脑上的，你干嘛要把设备的特性干掉？\"\n\n```mermaid\nflowchart TB\n    subgraph L1[\"⚪ Liblib（第一代）\"]\n        A1[\"设计师换一个 AI 工具<br/>原工具 + AI 混用\"]\n        A2[\"门槛仍高·服务专业创作者\"]\n        A3[\"坐在 Photoshop 的上游<br/>下游仍是 PS\"]\n    end\n    subgraph L2[\"🟢 Lovart（第二代·新需求）\"]\n        B1[\"每个人的 AI Designer<br/>甲方/marketing 直接用\"]\n        B2[\"还原'人和人类设计师'协作<br/>无限画布 + Touch Edit 指着改\"]\n        B3[\"新需求：要请设计师的人<br/>不必请设计师 / 一人干十人活\"]\n        B4[\"会取代一部分设计师<br/>= 设计的平权\"]\n    end\n    L1 -->|范式跃迁| L2\n\n    style L1 fill:#e5e7eb,stroke:#6b7280\n    style L2 fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n```\n\n> 💡 **萃取：**做\"类人协作\"的 AI 产品，最稳的设计锚点不是追新概念，而是\"照搬人和人协作的物理方式\"——画布、用手指、看着改稿。设备没变，就别把设备的特性（屏幕=画布）给抹掉。\n\n---\n\n## 六、引爆：一上线就爆，运气成分很小\n\nLovart 没有任何投放，发出第一条 Twitter（配了一个演示用法的视频）就带来 100 多万访问。\"我晚上忙到很晚要上线，睡一觉起来发现 100 多万访问，我傻了，然后非常开心——因为我知道这个产品最大的挑战就在冷启动，冷启动解决了，后面我都有把握。\" 他们当时全球没影响力，只找了一些小 KOL，结果超出预期。陈冕的判断很冷静：\n\n- **冷启动是这类产品最大挑战，冷启动一解决，后面都有把握**\n- 马斯克给\"用 Lovart 做的恶搞特斯拉海报\"点赞——他**主动淡化**：\"马斯克大概也不知道是我们产品做的，他只是因为 Cybertruck 点赞，这不是对产品的证明，声量不是我应得的，还是要把产品做更好\"\n- 真正的引爆是\"**集体叙事在呼唤这类产品**\"：DeepSeek→Manus→Lovart，全球都在关注 Agent；Lovart 是\"第一个垂直的设计类 Agent\"，离 Manus 时间很短又有很大差异。\"那个时间点大家本来就在关注这个领域，所以本质上还是产品创新带来的增长。\"\n- 整体增长是\"**爆发式、一上线就爆**\"，不是添砖加瓦垒起来的——核心几个点一上线就概念上做得非常好，\"大家直接就觉得对了\"。罗永浩追问是否有戏剧性转折点，陈冕答\"整体还是爆发式的\"。\n- 也有\"突然事件\"加成：模型能力发生了变化。但罗永浩用下来的判断是\"**你这里边运气成分很小，几乎是百分之百的产品胜利**\"（没借助偶然因素直接引爆）。\n\n> \"创新换来流量的本质，是我们把潜意识里大家期待的东西描绘出来了……大家觉得'原来我想的就是他做出来了'。\"\n\n**用户画像的迁移**正在加速：Lovart 日活几十万，**用户从纯专业设计师变成\"甲方越来越多、大部分是甲方\"**（专业需求，但非专业的人）。陈冕：\"这个速度在明年可能会比大家想象中更快，我们现在已经感受到这个信号了。\" 罗永浩描述了典型场景——一个公司市场部有大量物料需求，只要内部有个比老板意识早的聪明孩子试用并给出成果，就会往这使劲投入，\"然后少量设计师再做最后的微调就好了\"。\n\n罗永浩主动提出年底（12 月 30 日大会）要**现场演示**：\"我先跟大家说一个需求，然后现场给它演示出来，让那些大量使用物料的甲方知道——这件事其实已经到了这个阶段，你只是不知道而已，不用再等了。\" 他试用后判断：\"**它整个这个框架比我想的要牛逼得多**，比起细节经验。\"\n\n商业进展（节目录制时）：**上一周现金流已转正**（只算算力成本 vs 收入）；**明年上半年有望毛利转正**；收入远超此前公布的 3000 万；整个公司盈利\"很遥远\"，因为还要投研发。这是一个**收入爆发但巨额亏损、靠\"花钱本身也是门槛\"卡住抄袭者**的状态。\n\n> 💡 **萃取：**爆款要区分\"运气性声量\"和\"产品性增长\"。把名人点赞这类偶然事件主动祛魅、归因到\"产品满足了集体潜意识期待\"，才能持续复制增长，而不是赌下一次运气。\n\n---\n\n## 七、陈冕的创业方法论（本期最高价值）\n\n这是全期最可迁移的部分，几乎是一套完整的\"垂直 AI 创业自检框架\"。\n\n### 7.1 认知 × 速度 × 信念\n\n> \"创业最重要的确实还是认知和速度、学习速度。一个是认知——你要看到别人没看到的东西；第二是你最快速度地实现它。如果再加一个，就是信念，你要相信你认知到的东西。\"\n\n- 大厂只做 80% 概率的事；创业者要做**只有 10% 概率但你信它一定能成**的事\n- 大厂在 10% 概率的事上\"理性地不应该做\"——**这正是创业者的窗口**\n- \"你什么都没有，你怕什么失败呢？\" / 在局部战场上，**有信念者敢投入比大厂更多的资源**\n- 而 AI 时代 **\"speed is all your need\"**：认知重要，但你想到了速度跟不上也没用；\"我们都是以小时在迭代认知\"\n\n### 7.2 上游 vs 下游 + 新人群 vs 新需求\n\n跟大厂竞争的两条核心心法：\n\n1. **坐在人家工作流的上游，不要坐下游**\n   - Midjourney/Liblib 的下游都是 Photoshop，但它们做得很好；可你若去做\"创成式填充/修片加特效\"（Photoshop 的下游），大概率干不过\n   - 做上游 + 新体验 + 抢走注意力 → 你的用户自然流向下游，\"so what？而且你足够快时，大家会默认大厂也做不好那个事\"\n2. **新人群 / 新需求**（陈冕用了一组精确对照）\n   - 上游/下游成立的前提是\"**人群和需求都重合**\"：Midjourney/Liblib 用户下游大部分都是 Photoshop，但它们做得很好；可若你做创成式填充/修片加 AI 特效（PS 的下游），大概率做不过 Photoshop 和美图秀秀。\"你做下游很容易被他吃掉，因为上游在他手上；你做上游又是新体验、获得大量注意力，那你怕什么？你可以补下游啊。\"\n   - **Canva 案例**：Instagram/Facebook 火后，要做 social media post 的人**\"不是他不想用 Adobe，是他 cannot——他没这个能力，因为他得学\"**。它是图像需求，但不是同一个需求、不是同一个人群——**新人群需要新产品**。\n   - **Lovart 是\"新需求\"**：\"liblib 是上游，但 Lovart totally 是新需求，因为它本质上要做的是请设计师的人不要请设计师了，或者一个设计师干 10 个设计师的活——原来那些活还是用 Adobe。\"\n\n### 7.3 变大之后必须有\"足够 solid 的壁垒\"\n\n光有上下游/新人群还不够，\"如果你做大了，你有没有壁垒？\"\n\n- 反例 Runway（若狭义定位为视频模型）：核心能力是模型，但**模型=堆钱堆卡堆人**，大厂钱多卡多还能挖人 → 没壁垒\n- 用户迁移成本能当壁垒吗？**\"如果有更好的模型，用户一定会去用更好的模型\"** → 流量/用户也很脆弱\n- 要思考的真问题是：**\"能不能在没有壁垒之前变大，在变大之后建立壁垒？\"**\n- 打怪比喻（原话）：\"这就跟你玩游戏打怪一样，你是先练好级再去打 boss，还是一来就去打 boss？你为什么在练级的时候 boss 不来打你呢？因为 **you are nobody**，boss 为什么会来打你？他有他要忙的。当你练完小怪之后，你一定会去打 boss 的。\" → 罗永浩：\"所以**猥琐发育也很重要，不能嘚瑟**。\"\n- 外卖大战的提醒：\"这次外卖大战刷新了我的认知——我们常说'尘埃落定'，结果发现没有尘埃落定，逼急了什么都可能。美团都那么大了不也有人跟它竞争吗？所以你还是得想壁垒是不是足够 solid、足够牢固。\"\n\n### 7.4 赌\"AGI 五年内不会到来\"\n\n- AI/模型的进化理论上会**摧毁一切旧有的东西**；如果模型进化无限快，\"除了成为造物主，没什么是重要的，人只能接入它\"\n- 但陈冕和罗永浩都判断 **5–10 年内 AGI 全面超越人很难**；\"一旦它全面超过人，就会远远地全面超过人\"，但到那一步有长路\n- 因此 Lovart 的阶段性假设：**AI 无限接近人但还没超越人，人类的 taste 仍有意义**——做\"无限接近人、但要像人和人一样简单交互\"的产品\n\n陈冕把这个逻辑讲得很透：\n\n> \"如果模型进化越来越快，那除了模型、除了 deliver 更好的智能，什么事情都不重要了……那除了成为造物主，还有什么是重要的呢？人就只能接入它。所以如果你很信 AI 短期内远远超过人，那我们除了做模型相关的产业链，什么都不应该做。\"\n\n> \"但如果你想要它不发生，你就必须想它可能进化到什么形态？我们的假设是它无限接近人但还没超越人，人在某些地方还有意义（人类的 taste 还有意义）。那 AI 都无限趋近于人了，它的使用门槛还不能像人跟人交流一样简单吗？那就不太对了吧。\"\n\n- \"想太久一切都没意义，想太短又会很快被干掉，所以只能选一个**阶段性终局**\"\n- 罗永浩补：\"假设五年没出现 AGI，对很多优秀团队这已足以变成很大的公司，那时它掌握的资源、策略也会调整；而十年后更不用考虑，科技行业本来就不用考虑十年后——十年后没人能预测。\"\n\n```mermaid\nflowchart TB\n    Q1{在人家工作流的<br/>上游还是下游?}\n    Q1 -->|下游| Die[\"❌ 易被上游吃掉\"]\n    Q1 -->|上游+新体验| Q2{是新人群<br/>或新需求吗?}\n    Q2 -->|同人群同需求| Risk[\"⚠️ 缺乏差异化\"]\n    Q2 -->|新人群/新需求| Q3{变大后有<br/>solid 壁垒吗?}\n    Q3 -->|核心是模型/用户易迁移| Sell[\"⚪ 没壁垒 → 卖掉\"]\n    Q3 -->|社区/数据/后训练/速度| Q4{赌 AGI<br/>5-10年不来?}\n    Q4 -->|是| Win[\"🟢 阶段性终局可成立<br/>认知×速度×信念全速冲刺\"]\n    Q4 -->|AGI很快来| Only[\"除做模型外<br/>什么都不该做\"]\n\n    style Die fill:#fee2e2,stroke:#dc2626\n    style Risk fill:#fef3c7,stroke:#d97706\n    style Sell fill:#e5e7eb,stroke:#6b7280\n    style Win fill:#dcfce7,stroke:#16a34a,stroke-width:3px\n    style Only fill:#fce7f3,stroke:#be185d\n```\n\n### 7.5 \"套壳\"不丢人，但要从套壳长出自己的能力\n\n罗永浩反思 2023 年自己做 AR 收尾、慌张学 AI 却没找到方向时的教训：\"那个时候我们做套壳就对了，想那么多干啥？应该先套、先动手——很多事你做的时候就学会了。\"两人共识：\n\n- **应用公司本质都是\"广义套壳\"**，张一鸣的字节、抖音那个时代都是应用公司\n- \"套壳套着套着大家说护城河不行\"——但护城河有很多方式：**做社区/互联网效应是护城河；靠套壳融到几十亿上百亿，这钱可以转去做硬科技也是护城河**\n- 关键是\"**套壳是要套的，但套到最后你得有自己的能力，不然短期能套、长期还是得有**\"\n- 创业都是滚雪球，用自己的：**要做就第一件事先出来**（性格稳一点的在大厂会再犹豫三五年，机会就没了）\n\n罗永浩还讲了\"AI native 的常见低级错误\"：看到 AI 文字能力强就想做文字处理软件接 AI，还没做成熟 Notion 就接上 AI 了——\"你写个 Notion 要三五年还不一定写得出来，再给它接 AI 跟你有什么关系？\" 看到图像能力强就想做图像编辑，Firefly 就发布了。**\"创业团队在旧世界应用里用 AI 赋能，这碗饭好吃但轮不到你吃，都是旧世界霸主在原有模式里加 AI 就很舒服了。\"**\n\n> 💡 **萃取：**垂直 AI 创业的护城河不在\"先发\"，而在\"能否在被巨头盯上前变大、变大后建起非模型壁垒（社区/数据/后训练/迁移成本）\"，并显式押注一个\"AGI 暂不到来\"的阶段性终局——把战略建立在一个可证伪的时间假设上。\n\n### 7.6 Lovart 的实际护城河与\"花钱本身是门槛\"\n\n被问到护城河，陈冕给了具象+抽象两层：\n\n- **具象层**（点到为止，怕被抄）：成功活跃的**社区**（互联网效应）、产品走在前面的代码量、做**后训练**（基座模型不用做，但后训练比纯 prompt 强）\n- **算力/钱本身就是门槛**：Lovart 把\"最贵最好的模型都接上了\"，现在是**巨额亏损**，\"我们要是不融很多钱也做不了这件事\"\n- 罗永浩的担忧：\"万一为了保效果一直亏，到某个点设计大厂进来照抄、人家有钱呢？\" → 陈冕：\"**这个钱本身也是门槛**……所以你要在抢在那个点之前自己就一骑绝尘。\"\n\n抽象层回到核心：\"创业最重要的确实还是认知和速度、信念。\"\n\n---\n\n## 八、终局焦虑：AGI、核武器与\"螺旋上升\"\n\n两人花了不少时间谈 AI 的终极风险与人类心态周期：\n\n- **为什么人类明知风险还狂热拥抱 AI**？陈冕：\"文明都有周期——疯狂拥抱→遇困难→疯狂讨厌→再拥抱→均值回归。我们要祈祷的是别在疯狂的时候玩脱（拥抱时别玩脱、抵制时也别玩脱）。\"\n- **核武器类比**：人类发明核武器没被灭绝，是因为**原料太难获得**——\"如果放射性原料的产能跟铁一样，我们早就毁灭不知道多少次了\"。陈冕引申：\"人越到后面掌握的力量越强，越容易玩脱。\"\n- **但历史看人类在螺旋上升**：人均 GDP 越来越高、生活越来越好，\"核心点是周期带来的是循环、还是最终在上升\"——从这个角度陈冕偏乐观，\"但说不准什么时候也就玩脱了\"。\n- 罗永浩的年龄视角：\"我到中年心情复杂，有时觉得玩脱就玩脱吧；但我要二三十岁就特别不甘心。\"\n\n> \"在 AI 没有憋几年的东西，所有事情都是在滚雪球、全是加速度冲刺，只是要滚雪球……只要模型的 scaling 不停止，就一直在全速冲刺。speed is all your need。\"\n\n> 💡 **萃取：**对待指数级技术，个体能做的不是预测终局，而是认清\"文明有周期但长期螺旋上升\"，并把战略建立在\"模型 scaling 不停就全速冲刺\"的节奏假设上——速度本身就是对冲不确定性的方式。\n\n---\n\n## 九、AI 对设计/创意行业的冲击判断\n\n- **不会让人失业（AGI 之前），但工种从业者会变少**：只有最尖端的人留下、变得更贵；**中下游、同质化、\"只有技能没有想法/没有 taste/定不了审美\"的从业者会被取代**\n- 设计领域被冲击会**比写代码更剧烈、更快**——因为\"写代码的甲方\"没有\"设计的甲方\"那么想摆脱依赖（设计需求本就是甲方定的，他只是没能力做，还要看设计师脸色、给钱、被嫌土）\n- 五年内能干掉设计师工种的 **80% 以上**，且\"很快了\"\n- 与写代码类比：写代码淘汰的是\"码农\"（牛逼架构师/能创新的是极少数），设计领域同理会淘汰\"码农级\"设计师，\"但设计领域会更剧烈\"\n- 这种残酷\"要从两个角度看\"：它是生产力革命，最终让每个人可分配的财富更多；但\"以前掌握一个技能做得好就终生靠它吃饭，这件事会越来越不存在\"，随之而来的挫败感、以及社会学/心理学层面的复杂问题需要解决\n- Lovart 是\"**设计的平权**\"：普通人不必经过跟才华相关的严苛训练就能有好输出；世界的内容会因 AI 更丰富\n- 摄影术类比：人像画师的出路是转向\"自我表达/集体情绪/新风格/新 taste\"——**AGI 前 AI 学的是存量、不自主反思，新 taste 对人类有价值**，且 taste 总是体察\"当事人变化的情绪\"的（文艺复兴风格离开那个时代就不成立）\n- 但\"**新风格怎么被保护、怎么不被抄**\"，陈冕坦言没有答案，需要司法立法介入，让创造新风格的少数人 reward 更高\n\n**插画师/原画师的出路**（罗永浩追问得很深）：摄影术出现后人像画师的出路类比——不能再画纪实，必须转型创造\"自我表达 / 集体情绪 / 新风格 / 新 taste\"。\n\n> \"AGI 实现之前，AI 还是学原来的、不会自主学习、不会自主反思，那新的 taste 和新的风格对人类社会就是有价值的……而且它往往体察当事人变化的情绪、审美、感觉。文艺复兴时代的风格如果不在文艺复兴时代，它就不会成为文艺复兴。\"\n\n但\"宫崎骏式的个人风格 30 年才练成，一夜被 AI 抄得铺天盖地、风格版权又极难界定\"这个难题，陈冕坦言**没有答案**，只能寄望司法立法介入，让创造新风格的少数人 reward 更高。罗永浩则对\"taste 会被破解\"更悲观也更\"乐观\"：\n\n> \"我是文科生但有理科生崇拜……我们文科生引以为傲的那些'赋予灵魂'的东西，最终就是因为算力不够、算法不对，最终全都能破解。\" — 罗永浩，并以 DeepSeek 春节\"只有一天离开世界会说什么\"的回答为例，称其中有几条\"是人类顶级文学家才能写出来、看的时候触及灵魂\"。\n\n陈冕则更克制：\"我觉得技术一定能解决，但可能不是现在的技术路线一定能解决——伊利亚前两天的访谈也说了这个。\"两人甚至半玩笑地谈到\"碳基文明不接入硅基就是拖后腿\"、\"打不过加入\"的终局焦虑。\n\n> \"甚至设计领域会更剧烈，因为写代码的甲方……其实没有设计的甲方的（摆脱依赖动机）那么强。\"\n\n> 💡 **萃取：**AI 冲击的不是\"职业\"而是\"职业里的同质化部分\"。判断一个岗位会被冲击多狠，可看\"甲方有多想摆脱对这个岗位的依赖\"——依赖越被动、甲方越憋屈，替代来得越猛。\n\n---\n\n## 十、产品史的\"长出来\"哲学（罗永浩 × 陈冕）\n\n两人反复回到一个共识：**伟大产品不是规划出来的，是在土壤上\"长出来\"的**。\n\n- 抖音前身 Musical.ly（朱骏团队）是\"跳舞卡点+唱歌对口型\"给年轻人玩的玩票想法；马化腾被早期股东追着推荐了好几次：\"我两个侄女给我显摆过，我装上看不出有什么价值又卸载了\"，等抖音威胁腾讯才仓促应战。\"谁能想到张一鸣、朱骏自己都想不到，未来人们会在手机上看 15 秒一只的视频看 4 个小时看通宵——它是长出来的，不是规划出来的。\" 罗永浩还举曲面屏作反例（\"诞生到今天一点屁用没有，只做砸了一些讨厌的瀑布屏\"），但同时强调\"硬核解决了从前做不到的事的技术，将来不一定在哪个点上以什么形式，它就是有用——历史上发明的没用的很少\"。\n- 剪映/CapCut 本是抖音的\"影像功能\"、不是独立业务、无收入；陈冕去了才把它做成独立订阅制业务\n- \"没有人能预见用户会在手机上看 15 秒一只的视频看通宵——它是长出来的\"\n\n这正反向支撑了陈冕\"信念\"论：大厂哪怕看到了也不会信、不会 all in 那 10% 概率，**创业者的机会就是\"比大公司更早认知 + 100% 信念 + 最快速度做大\"**。\n\n> \"新事物早期就是看不懂。\"\n\n> 💡 **萃取：**\"看不懂\"不是新事物的 bug 而是 feature——正因为连巨头都看不懂、不敢信，留给信念者的窗口才存在。可规划性和颠覆性成反比。\n\n---\n\n## 十一、关于动机：钱之外的原动力\n\n陈冕从小痴迷金庸，价值观深受\"为国为民\"影响，最爱杨过——**\"大闹一场，然后悄然离去\"**就是他的人生愿望（中年后想做创业加速器，\"跟罗老师一样\"）。\n\n终极目标\"从来没变过\"：**改变世界、让世界的内容更丰富、做更普惠的产品**。\"如果我能成为推动世界发展一点点的人，会有巨大的成就感。\"\n\n罗永浩补了两个动人案例佐证\"驱动力不只是钱\"：\n\n- **苹果至今不做美颜**：苹果手机自拍做肖像模式、仿专业打灯都很牛，但**不做磨皮、瘦脸、去瑕疵**——这是品牌调性。罗永浩自陈个人极厌恶美颜（社恐+被陌生人要求开美颜合影\"特别想死\"），抖音里把腿拉成面条、脸磨成陶瓷娃娃\"处处都假\"他也不喜欢，\"但很多人喜欢，我也不好说他错\"。\n- **美图吴欣鸿讲做美颜时\"眼睛放光\"**：当年来锤子科技聊天，罗永浩本觉得\"把自己弄那么假是很 low 的事、对美颜不感兴趣\"，但吴欣鸿讲他帮成千上万有面容焦虑的人在图片里美化自己、解决心理焦虑、获得快乐时眼睛放光——\"我完全被他打动了，不是被带偏了一个不讲逻辑的方向，是**看这个问题的切入角度不一样**。难怪这事他做到全世界最好。\" AI 出来后美颜做得最好、用户最好的还是他们公司——\"人家都上市那么多年了差什么呢？驱动力肯定不来自钱。\"\n- \"一个人几十年如一日地拼，他得多爱钱才能这样？早该去过酒池肉林了\"——**没创过业限制了想象力**。\n\n**金庸与杨过**：陈冕小学就啃完金庸全部小说（\"飞雪连天射白鹿，笑书神侠倚碧鸳\"现在都能背），价值观深受\"为国为民\"影响，最爱杨过——因为\"**大闹一场，然后悄然离去**，这也是我的愿望\"。他和罗永浩约定到不同年龄段做不同的事：大闹一场后做创业加速器投资，\"但创业的梦想也没熄灭，所以都做\"。罗永浩调侃\"最好不要断臂\"，陈冕：\"不要断臂，但我知道一定会付出一些代价，精神上的断臂免不了。\"\n\n**设计的平权愿景**：他希望做用户量更多、更普惠的产品——\"Lovart 你可以说它取代了一部分设计师，但同时它也是设计的平权，让普通人不用做跟才华相关的严苛训练就能有好输出。设计本来稀缺、内容本来不够多，世界的内容因 AI 更丰富，本质上是这个世界被大家看到的截面更丰富了，所以世界也更丰富了——如果我能让世界变丰富一点点、让大家在丰富的世界里 enjoy 多一点点，那人生就无悔了。\"\n\n**三五年目标**：\"成为一家全球化的、成功的 AI 应用公司，做到应用层能做到的极限——像当年字节、小红书都是应用公司，我们希望做新时代中国出身创业者能做到的全球一流应用公司。\"\n\n关于焦虑：陈冕承认自己现在是\"**重度焦虑**\"（因为事业），\"但我一闲下来非常快就觉得自己不能闲，所以挺好的，这也是我想要的——焦虑着往前走呗\"。罗永浩分享亲历——锤子最难时去找国内权威精神心理医生给了很大帮助，有些药就管用\"没想象的那么复杂\"；并引\"**维持终生的轻度焦虑其实对人有好处**，特别松弛的人老得快、死得快\"。陈冕：\"轻度焦虑肯定是我希望的状态。\"\n\n> \"如果我能让这个世界变丰富一点点，让大家在丰富的世界里 enjoy 多一点点，那人生就无悔了，这真的是我的原动力。\"\n\n> 💡 **萃取：**长期主义的真正燃料往往不是钱，而是一个\"看问题的独特切入角度\"带来的意义感——能让平凡甚至被人鄙夷的事（美颜/物料设计）变成创始人眼里放光的使命。\n\n---\n\n## 十二、Sora 与 AI 内容的未来\n\n- 陈冕称 Sora 是继抖音、ChatGPT 之后第三次\"真正震撼\"——因为**看到了 To C App 的雏形**，\"我的想法被认可了，信念感被强化了\"\n- 但他判断 **Sora 本质是社交产品**，逻辑很产品经理：\n\n> \"如果你是一个产品经理，大概率会发现它内容的消费性是不够的——如果进去没刷到 Sam、没刷到你的各种朋友，你最开始会觉得它挺无聊的，因为 AI 视频内容质量还没那么好。所以它能火起来就是因为社交，那本质上你对它的定义应该是一个社交产品。\"\n\n- 如今 Sora\"又不像社交又不像内容、定位模糊\"——做泛内容依赖的是优质/有价值的内容（你刷小红书不是因为朋友都在刷），做社交依赖的是社交关系，\"所以现在 Sora 到底是什么？我觉得他自己也没想清楚\"，**产品迭代变慢，可能与 researcher 为主的团队构成有关**\n- 他作为产品经理\"会把它做对的东西看到、把它做错的东西脑补成我觉得对的东西，然后就很嗨\"\n- 一个预测：**AI 会催生大量新内容**。现在已能在小红书/抖音零星看到\"既不会做视频、也不会用 Photoshop、只有想法\"的人用简陋 AI 做出\"画面有硬伤但足够精彩好玩、病毒式传播\"的东西——\"这件事一定是星星之火最后燎原\"，随着生成质量越来越好，到某个临界点就爆了\n- 罗永浩的隐忧：**视频生成成本比 Lovart 还高得多**，导致很多好机会自然落到大厂头上 → 陈冕：\"大家加入我们，我们也有钱。\"\n- \"AI 味\"由两部分造成：① 技术局限（很快解决）② **表达的同质**——大家都用简单提示词，模型不知道你要什么审美就出相似风格；专业的人/专业 Agent 操作越深，差异化越大\n- \"AI 真假难辨这件事毋庸置疑，很快你完全分不清\"\n\n> \"创新换来流量的本质，其实是我们把潜意识里大家期待的东西描绘出来了。\"\n\n> 💡 **萃取：**判断一个 AI 内容产品的真实定位，要看它\"靠什么火起来\"——靠社交关系火的就是社交产品，靠优质内容火的才是内容产品；定位模糊=没想清楚靠什么留住人。\n\n---\n\n## 十三、中美 AI 创业生态差异\n\n陈冕的观察：\n\n- **国内\"老炮\"更多，跑出来的大部分是老炮，年轻人/新人真正跑出来的少**。本质不只是付费环境，而是整个创业生态：\n  - 中国上一个时代头部集中已很明显，**一堆很有经验的创业者还\"憋着一股劲\"还没发挥**，这一代他们再来\n  - 中国市场对创业者的**商业化/融资/增长能力要求更全面**（付费环境差、竞争更残酷）；硅谷可能只要一个点子单点突破就行\n  - \"不是新人不够好，是上面那些憋着劲的人还没发挥出来呢\"\n- **硅谷的退出机制好**：陈冕去硅谷交流，看到资金只够八九个月、融资不乐观的团队还在没日没夜抠产品，问起来对方答\"把产品扣好了到时候能卖呀，走不下去就卖掉呗\"——**做出好东西原地解散在硅谷很少见**；而中国黄金移动互联网十年很多好东西最后\"原地解散、都很卖不起\"（单机游戏、工具、设计这几年才稍好）。\n- 罗永浩补了\"逼良为娼\"的案例：优秀游戏团队被大厂抄到啥也不剩，最后去中东做满足富二代情绪价值的社交打牌游戏，赚了钱却毫无成就感。\n- 两人共识：**这一代中国创业者应该用\"创新带来增长\"洗掉西方对中国科技\"copy to China / 抄来抄去\"的认知**——\"innovation for the world\"。陈冕：\"不要抄来抄去的，真的很没意思，你能不能创一个别的心。\"\n\n还有一段有趣的观察——**这波 AI 硅谷华人比例异常高**：罗永浩说经典互联网/PC 时代硅谷工程师约\"30% 中国人 + 30% 印度人\"，印度人英语+管理有优势、华人研究有优势；但 AI 这波\"华人比例超过 50%，顶级 AI 团队要从一堆黄色面孔里找白人黑人\"。陈冕的半玩笑解释：\"因为印度人在做管理嘛，做研究就只剩华人了——做管理也做不出好模型。\" 罗永浩观察刚毕业的印度人也没做到管理层、却仍少做 AI 研究，认为\"中国理工科基础教育扎实\"是部分原因，但\"没有哪个单一元素让人信服，肯定是复合原因\"。两人也都看好新一代——\"现在十七八岁的中国插画师能画世界级的东西，我们那年代学插画的小时候看的都是垃圾、二三十岁才看到好东西\"。\n\n> 💡 **萃取：**创业生态决定创业者画像。中国\"老炮密度高+市场要求全能力+退出机制差\"，意味着这里成功的创业者必须是\"长板极致+短板补齐\"的全能型，而非硅谷式的单点天才。\n\n---\n\n## 十四、罗永浩的\"中国最好科技加速器\"愿景与 AI 监管松绑\n\n这段是罗永浩自己的\"十字路口\"自白，对理解\"创始人原动力\"很有价值：\n\n- 起步做《十字路口》没想太多，但反复和合伙人探讨后初步定位是**做\"中国最好的科技加速器\"（而非孵化器）**——硬件孵化全世界他只服深圳李志（霁香）老师那家，他们也观摩学习过\n- 加速器本质也是基金：早期进入成为优秀创业者的股东，**\"真能帮上忙\"**（不像 99% 投资机构在加速阶段除了钱只会吹牛）。他举子弹短信一周装机 1500 万为例：\"这个阶段我们助推一下，那边十倍速度甩掉对手，基本必赢。\"\n- 驱动他的不是钱（\"直播最好时一周做一场和三场收入差三倍，我还是一周做一场\"），而是产品/体验/社会价值/成就感——这套商业逻辑是\"商业嗅觉比我好得多\"的合伙人想的，但合伙人懂他的原动力\n- 他还想**联合更有公信力、更体面的企业家推动 AI 监管松绑**——\"AI 审查主要诉求是维稳，除去维稳之外应给初创企业松松绑，否则我们很吃亏\"，但\"这事不适合我来主导\"（自嘲网红/吵架的历史包袱）\n\n罗永浩还插了一段\"融资/资本运作也是一种能力\"的反思（自陈年轻时对资本运作有偏见、后来觉得理解肤浅）：举暴风影音新三板时期暴涨、CFO 认真讨论\"用资本运作收购优酷\"为例——\"如果真用资本运作把优酷收购了，那中国最好的视频网站给你服务，你去度假就可以了；LVMH 老板全是资本运作、什么也不经营，但把奢侈品全囊括到一家手里，这是一种很牛的能力。\" 但他坦言自己对这个\"没兴趣\"，原动力始终是产品/体验/社会价值。\n\n> \"驱动这个的钱是很重要的因素，但对很多人根本不是第一因素……没创过业限制了想象力。\" — 罗永浩\n\n> 💡 **萃取：**创始人的\"原动力坐标系\"决定了商业决策的边界——当钱不是第一驱动时，需要一个\"商业嗅觉强、又懂你原动力\"的合伙人来把理想主义翻译成可持续的商业结构，否则容易把团队一起拖进过度理想主义。\n\n---\n\n## 关键金句（原话）\n\n> \"如果我不往前走，我会不知道我要去哪。\" — 谈无故乡带来的焦虑。\n\n> \"我很讨厌 follow，就很讨厌跟随……我希望让自己有影响力，这确实是我的一个动力。\"\n\n> \"我之前的所有选择……没有那个单一选择的对错吧，但是加起来我觉得没有什么可后悔的地方。\" — 谈被妖魔化的\"乱跳槽\"。\n\n> \"它至少是电脑的发明，不会小于电脑的发明……移动互联网只是互联网的第二波。\" — 对 AI 量级的定性。\n\n> \"出来混最重要是不是还是得出来……Timing is everything。\"\n\n> \"创业就是把自己的长板发挥到极致，然后通过长板换得的成功，再去补自己的短板。\"\n\n> \"让大家都筑底就好了，别走到只剩我一个人就行。\" — 危机时稳团队的真实目标。\n\n> \"你要看到别人没看到的东西……再加一个，就是信念，你要相信你认知到的东西。\"\n\n> \"你要做看不上他看不上的事，和他不敢信、不太信的事，但是你要很信。\"\n\n> \"你练完小怪之后，一定会去打 boss 的。\" / \"猥琐发育也很重要，不能嘚瑟。\"\n\n> \"能不能在没有壁垒之前变大，在变大之后建立壁垒？\" — 垂直创业的核心命题。\n\n> \"没有这个能力你这个体验就不存在——而不是打折，那才是 AI native。\"\n\n> \"speed is all your need。\" / \"我们都是以小时在迭代认知。\"\n\n> \"如果我能让这个世界变丰富一点点……那人生就无悔了。\"\n\n> \"大闹一场，然后悄然离去，这也是我的愿望。\" — 谈最爱的金庸人物杨过。\n\n---\n\n## 速记卡 · 最值得记住的 12 句\n\n1. 没有退路的\"无根焦虑\"可以是持续向前的唯一解，而非缺陷。\n2. 履历是\"乱\"还是\"刻意\"，取决于背后有没有一个不变的元目标——用终局倒推。\n3. 判断一件事的\"量级\"（互联网级 vs 电脑发明级）比判断方向更上游，决定你愿赌多大。\n4. 初创最致命的是\"长板偏科\"——只经营最强项、零经营融资/现金流这种短板综合能力。\n5. 危机时不是打鸡血，而是让团队\"筑底\"，靠少数听得懂的骨干撑过去；闲下来情绪传染最快。\n6. 做类人协作的 AI 产品，最稳锚点是\"照搬人和人协作的物理方式\"（画布/用手指/看着改稿）。\n7. 爆款要区分\"运气性声量\"和\"产品性增长\"，主动给名人点赞祛魅，归因到满足集体潜意识。\n8. 跟大厂竞争：坐工作流上游、做新人群/新需求；做下游或同质化必死。\n9. 护城河不在先发，而在\"被盯上前变大、变大后建非模型壁垒\"。\n10. 押注一个可证伪的时间假设（如\"AGI 五年不来\"）作为阶段性终局。\n11. AI 冲击的是职业里的同质化部分；甲方越想摆脱对岗位的依赖，替代来得越猛。\n12. \"看不懂\"是新事物的 feature——巨头不敢信，才留给信念者窗口。\n\n---\n\n## 可复用检查清单\n\n### 垂直 AI 产品方向自检（陈冕框架）\n- [ ] 它是 General/入口/基座（巨头必争）还是 Vertical（巨头看不上）？\n- [ ] 你坐在别人工作流的**上游**还是下游？做下游极易被上游吃掉。\n- [ ] 是**新人群**还是**新需求**？老人群+老需求=和巨头同质化竞争。\n- [ ] 它是真正的 **AI native**（没这能力体验就不存在）还是给旧产品\"打折式加 AI\"？\n- [ ] 变大之后**壁垒是否 solid**？（核心若只是模型/可迁移用户=没壁垒）\n- [ ] 你押注的\"阶段性终局\"基于哪个可证伪的时间假设（如 AGI N 年不来）？\n\n### 创业生死期自检\n- [ ] 是否在\"业务做好就能融到钱\"的错误自信上裸奔？融资是独立的综合能力。\n- [ ] 寒冬期是否**多囤了现金**、安排了**连续融资**节奏，而非一次进太多家？\n- [ ] 第一件事是否选了**创始人长板驱动**的方向（非技术出身就别选技术驱动）？\n- [ ] 低谷期稳团队，目标是\"打鸡血\"还是务实的\"让团队筑底、守住骨干\"？\n\n### AI 内容/工具产品定位自检\n- [ ] 这个产品**靠什么火起来**？社交关系 / 优质内容 / 工具效率——定位是否清晰？\n- [ ] 增长是\"运气性声量\"还是\"产品性增长（满足集体潜意识期待）\"？\n- [ ] 差异化是否来自\"专业的人/Agent 操作模型更深\"，而非简单提示词的同质输出？\n\n---\n\n## 关联\n- [[01_李想_25年创业之路]] — 同为\"融资能力是负分、靠业务硬走出来\"的创始人样本（李想自评\"融资能力是负分\"，与陈冕\"业务做好就能融资是错的认知\"互为镜像）\n- [[136_全球大模型季报第9集]] — 广密的\"垂直 agent 自检/壁垒/AGI 加速\"与陈冕的\"上下游+赌 AGI 不来\"在同一框架下对话\n- [[Lovart]] — 产品本体（占位双链，待建）\n- [[LiblibAI]] — 第一代产品（占位双链，待建）\n- 关联 TODO：与历史\"AI native 定义\"、\"垂直 Agent 壁垒\"、\"白领/创意失业\"主题笔记互链"}, {"id": "14_从拆玩具到影石全景相机", "num": "14", "name": "从拆玩具到影石全景相机", "theme": "从拆玩具到影石全景相机", "guest": "罗永浩、刘靖康（影石 Insta360 创始人）", "issue": "14", "duration": "04:23:12", "cat_key": "core", "cat_idx": "一", "cat_title": "直指核心战役", "cat_sub": "AI · 创业 · 管理", "cat_color": "#ff6a3d", "rank": 2, "reason": "品类创新 + 供应链硬功夫；AI 改变产品形态但消灭不了人对「真实」的需求——AI+大班课差异化的镜子。", "md": "> 注：转写 ASR 把嘉宾误标为「谭星/老谭」（罗永浩口语昵称），实际嘉宾为影石 Insta360 创始人**刘靖康**，1991 年生，南京大学软件学院。本笔记统一用「刘靖康」。\n\n## 一句话总结\n\n一个在宽容环境里\"嘚瑟\"过界又被拉回来的技术少年，把\"创造的成就感\"当主线、把\"生存与股东回报\"当约束，靠供应链硬功夫和\"创造新品类\"在 GoPro 与大疆夹击中跑出影石；他对 AI 的判断是——AI 改变产品形态但消灭不了人对\"真实\"的需求。\n\n## 整体地图\n\n```mermaid\nflowchart TB\n    Origin[\"宽松家庭 + 父亲创业起落<br/>小学三年级一台 64M 电脑\"]\n    Origin --> Soft[\"软件门槛低、不费钱<br/>5 年级自学 Flash/ActionScript<br/>'创造作品'的成就感\"]\n    Soft --> Boundary[\"大学'嘚瑟'三连<br/>社交网站/打卡图谱/入侵邮箱<br/>留校察看 = 关键负反馈\"]\n    Boundary --> Pivot[\"创业：To B 直播 → 全景相机<br/>VR 证伪 → 全景运动相机品类\"]\n    Pivot --> Hardware[\"硬件硬功夫<br/>供应链 = 49% 功劳<br/>持续不犯错 = 隐性门槛\"]\n    Hardware --> Market[\"全球化 + 网红教育市场<br/>社交货币式自传播<br/>2023H1 营收超 GoPro\"]\n    Market --> AI[\"AI 判断<br/>记录/分享/创作三需求<br/>真实是新稀缺资源\"]\n    AI --> Mission[\"终局：创造 > 生存<br/>从造产品到'造创业者'<br/>think bold\"]\n\n    style Origin fill:#e5e7eb,stroke:#6b7280\n    style Soft fill:#dbeafe,stroke:#2563eb\n    style Boundary fill:#fef3c7,stroke:#d97706,stroke-width:3px\n    style Pivot fill:#fef3c7,stroke:#d97706\n    style Hardware fill:#dbeafe,stroke:#2563eb,stroke-width:2px\n    style Market fill:#dcfce7,stroke:#16a34a\n    style AI fill:#dbeafe,stroke:#2563eb\n    style Mission fill:#fce7f3,stroke:#be185d,stroke-width:2px\n```\n\n## 人生/事业时间线\n\n```mermaid\ntimeline\n    title 刘靖康 / 影石 关键节点\n    1991 : 广东中山出生 : 父母银行职员 父亲约2000年下海做手袋/玩具欠债\n    小学三年级 : 第一台电脑(64M内存) : 拆四驱车马达做模型船\n    五年级 : 自学 Flash/ActionScript : \"创造作品\"的成就感>\"玩\"\n    高中 : 全国电脑制作比赛一等奖+高考加20分 : 腿部动作控谷歌街景漫游\n    大学(南大软院) : 嘚瑟三连 : 社交网站/打卡图谱/入侵邮箱→留校察看\n    毕业前 : 自筹15万+IDG 400万 : 直播App 否则解散\n    2015 : 转型全景相机 : 启明投资(差点因IP连不上丢掉) instant/影石\n    2016 : 迅雷900万美元 : 定使命\"更好记录分享生活\" 此后自我造血\n    2017-18 : Nano→One : 账上仅6000万的危险时刻 自动剪辑(CNN+规则)\n    2020 : 模块化相机品控事故+疫情 : 同年决定做无人机(能力站升维)\n    2023 : GPT冲击 : 自动剪辑改端到端 增强全自动拍摄信心\n    近年 : 科创板上市 2023H1营收超GoPro : 6起专利官司 与大疆全面竞争 slogan→think bold\n```\n\n---\n\n## 一、出身与\"创造成就感\"的起源\n\n### 宽松但起落的家庭\n\n刘靖康在广东中山长大，父母在银行认识，父亲约 2000 年下海做手袋和玩具，初期亏损欠了四五十万。家庭经济一度紧张，但父母在他小学三年级（9-10 岁）就给他买了一台电脑——尽管那是台\"64 兆内存、潮湿天气要拿吹风机吹主板才能开机\"的破电脑。\n\n> \"即使我当时买电脑是为了玩游戏，也没有说为了去做做个什么事情……他们还是非常支持我。\" — 刘靖康\n\n他看过创业最差的样子，也看过父亲靠坚持慢慢爬起来（约 2008 年好转），这给了他对\"做生意\"完整而立体的认知：\n\n> \"我父亲刚开始创业自己不是很懂、纯粹想赚钱，生意失败，2000 年前后欠了四五十万。我看过我妈很抑郁、会流泪那种样子，极端时情绪上来甚至提过离婚——但他们其实非常相濡以沫。所以我看过创业失败最差的情况，也很幸运看过我父亲靠坚持慢慢爬起来。\" — 刘靖康\n\n> \"这让我对做生意有一个比较立体的认知——看过很成功是什么样子，也看过很失败是什么样子，看过失败的代价是什么，也看过失败又重新爬起来的可能性。\" — 刘靖康\n\n他的动手能力其实是\"被穷出来的\"——家里不常买玩具，逼着他自己造（这恰好成了后来做硬件的童子功）：\n\n> \"小的时候比较喜欢倒腾手工类的东西，因为他们不给我买玩具，所以只能自己找一些材料，做一些遥控船……把四驱车的马达拆出来换个壳，把吹风机拆出来变个形状。\" — 刘靖康（不过他强调小时候只换外形，还没能力做电路层面的改造）\n\n### 不沉迷游戏，是因为想\"自己设定规则\"\n\n他对游戏没有沉迷倾向：玩一轮摸清规则就失去兴趣。\n\n> \"玩了一轮游戏之后都觉得好像游戏就这样子，在别人写的一堆规则里面，你不断的失败……与其在别人设定的规则里面去玩，看自己能不能自己去设定规则。\" — 刘靖康\n\n五年级开始自学 Flash 的 ActionScript，做小游戏、动画、直播软件。一个关键对比：硬件创造只能停留在\"玩\"，软件创造能产出\"作品\"，带来更高级的成就感。\n\n### 软件 vs 硬件的门槛差异（贯穿一生的判断）\n\n> \"软件是个入门门槛相对低的……他不怎么费钱，你搞了个电脑就可以了。但是如果你要搞硬件的话，你搞很多材料。\" — 刘靖康\n\n> \"做软件的刚毕业的很多优秀的小伙就可以做很多东西。但是做硬件呢，没有在硬件公司里工作过 5~10 年以上的，即使他是很牛的院校毕业的，也没什么用，会踩很多坑。\" — 罗永浩 / 刘靖康共识\n\n### learning curve：起点 80 分才有正反馈\n\n初中参加信息学竞赛受挫——那更接近数学题、problem solving，对智商要求\"next level\"，他只能排中下，强烈挫败。于是转向\"应用型\"开发（每做一点就看到真实发生）。这反过来更早帮他确定了方向。这套\"靠阶段性成就感选方向\"的逻辑，他甚至用来解释自己为什么不沉迷游戏：\n\n> \"我是一个比较依赖阶段性成就感的人。打游戏我可能花很多时间研究、真的能打得很好，但一开始打得不太好、挫败感袭来，可能就不太想了。信息学就有这个问题；但做应用的话，你每做一点东西就会看到那个东西真实地发生，就有持续的成就感。\" — 刘靖康\n\n> \"其实最好的一种学习状态，就你每往前走一步，你都会感受到自己看得见的进步，这是一种很幸福的学习状态。\" — 刘靖康\n\n> \"你起点在不到 60 分得不到任何正反馈，你可能就放弃了。但在特定领域里你一起步就是 80 分，就容易得到正向反馈，最后可能就能到 90 分、100 分。\" — 罗永浩\n\n> 💡 **萃取：**人不是在自己最强的方向\"逼\"出能力的，而是在能持续拿到小正反馈的方向上\"滚\"出能力的——选赛道时，比起\"我最想做什么\"，更该问\"哪条路我起步就能拿到看得见的进步\"。\n\n### 科技产品启蒙：从\"拙劣模仿\"到\"很不一样\"\n\n中山能收香港翡翠台/本港台，大量日本动画绑定玩具（宠物小精灵、数码宝贝、四驱车、悠悠球、高达），玩具类型多且\"得自己动手做、含电子部分\"。他印象深的科技产品：诺基亚 N93/N95、文曲星（以学习名义买的游戏机）、小霸王（最初学的是五笔、\"事实上插了很多游戏卡\"）、大学时的 iPod classic（被 click wheel 和 cover flow 震撼）、高中买得起的魅族 MP4（可烧录自定义皮肤）。\n\n罗永浩点破了小霸王这类产品的精妙之处——它本质是\"厂商 + 孩子合谋忽悠家长\"：\n\n> \"小霸王做得真是聪明，它跟孩子完成了一个把家长给忽悠了的合谋……家长认真地相信这东西是买给孩子学习的，厂商也宣传了这一点，还找了成龙，但孩子们都知道它是怎么回事。\" — 罗永浩\n\n魅族 MP4 给刘靖康的真正启发，是\"在一个便携设备上看到自己设计的界面\"那种成就感——这其实就是他后来一以贯之的\"创造作品\"主线的雏形：\n\n> \"网上有些软件可以制作自己的皮肤，把皮肤烧进去……以前搞计算机都是在一个 laptop 上变化，你今天看到一个 portable 的设备上面有你自己去设计的一些 UI、一些 graphics，也是很有成就感的一件事情。\" — 刘靖康\n\n罗永浩补了一段对魅族的观察，恰是\"持续创新 vs 守成\"主题的伏笔——他两次被魅族\"震惊\"，但第三次（安卓时代）就没了惊讶：\n\n> \"我第一次看魅族 MP3，就像对一个 iPod 的拙劣模仿……但卖得非常好。过了两三年我去深圳出差，在电脑城突然发现一个蓝色装修的专卖店写着魅族，进去一看居然是手机——拿 Windows CE 改的，改得很像苹果。在一个严重受限的 Windows CE 的底子上做成这样，我还是很震惊的，觉得这公司很了不起。但等大家都去做安卓手机的时候，我一看就没有那么明显的进步了。\" — 罗永浩\n\n（插曲：罗永浩还回忆了自己匮乏年代靠姐姐在图书馆工作\"走后门\"读书改变命运的经历——\"我比她小 9 岁，我就怂恿她去图书馆工作，因为她也不知道去哪，我是为了我自己看书方便，结果反过来改变了我的命运\"——与刘靖康\"90 后赶上科技与信息丰裕\"形成两代人的对照。）\n\n> 💡 **萃取：**让一个少年从\"拼装/拆解\"走向\"创造\"的，是工具门槛的下降（软件不费钱、起步即可产出作品）。给孩子或新人配一个\"低成本、能快速看到自己作品\"的创造工具，比讲道理更能点燃长期热情。\n\n---\n\n## 二、自我评价体系：向外求 vs 向内求\n\n刘靖康长期的自我评价来自他人认可——这是他\"调皮/嘚瑟\"行为的底层动机（希望获得关注），也是大学几次出格的根源。他把这条线索一直延伸到了\"创始人到顶后会不会作恶\"的终局问题上：向外求认可的人，到顶后会以\"维持领导地位\"为目标（容易守成甚至作恶）；向内求、安全感足的人，才更可能持续创造。\n\n> \"我最近也在想个问题，就是你对自我的评价体系，是来自于他人，还是来自于你跟事物打交道本身，这可能是一个比较关键的事情。\" — 刘靖康\n\n罗永浩补充了一段对\"高智商孩子未必幸福\"的观察，以及计算机革命的独特红利：\n\n> \"计算机革命使得人类第一次出现了 20 多岁的亿万富翁……他的人生还是充满着 passion、好奇心、热情，可以利用年轻时掌握的资源，做很多有意思的事情。\" — 罗永浩 / 刘靖康呼应\n\n罗永浩抛出\"计算机革命第一次批量造出 20 多岁亿万富翁\"这一被低估的红利——年轻时就有巨大资源、且 passion/好奇心/热情尚未释放过半，能驱使他们为世界做长远的事；而传统时代熬到中年才有钱，热情和精力已过半。刘靖康赞同但补了关键一层——人是环境的产物，连\"先辈企业家更保守\"也是环境塑造的，不是人差：\n\n> \"我认为更前面一辈的企业家，如果跟我们同龄出生，可能也会这样子。人是环境的产物，并不是谁比谁更特别、更有追求。\" — 刘靖康\n\n> \"我认为人是环境的产物，并不是说谁就比谁更特别、更有追求……以我父亲为例，他对自己做的事不那么喜欢，但小时候家里环境不好、特别没安全感，所以即使赚到钱还是省吃俭用、想赚更多。这跟他的环境有关系。\" — 刘靖康\n\n> \"正是先一辈的企业家和我们的父辈，经历这些事情，同时又给我们这一代创造了很好的成长环境，不让我们这么焦虑、支持我们做喜欢的事，我们才有机会在相对年轻的时候真的做成一些事情。\" — 刘靖康\n\n（插曲：刘靖康高二高三测智商约 140，自嘲\"天才里的吊车尾\"；罗永浩讲自己当年总测 130 多、女友测 140 多带来的挫败，并复述了知乎上一个让他印象很深的帖子——天才未必幸福：\n\n> \"一个家长写他很早发现孩子聪明得不正常，很多事大人还没想明白孩子就想明白了……这孩子六七岁就发现自己不但跟孩子们不一样、跟家长们也不一样，他发现成年人都很傻，于是很害怕，跟父母说时也藏着掖着，发现父母有比他笨的迹象时也不知道该怎么办，就显得很孤单、很容易自己吓到自己。\" — 罗永浩\n\n这恰好反向印证了刘靖康的核心命题：能力之外，\"安全感 + 宽容环境\"才是一个人能否健康成长的关键变量。）\n\n> 💡 **萃取：**把\"成就归因于自己更优秀\"换成\"成就归因于环境给了我安全感\"，不是谦虚，而是一种更准的因果认知——它直接决定了你后面会不会拼命向外求认可、会不会在到顶后还能保持创造而非守成。安全感越足，越能向内求；越缺安全感，越被\"赚更多/维持地位\"裹挟。\n\n---\n\n## 三、大学\"嘚瑟\"三连与\"不下牌桌的负反馈\"\n\n南大相对宽容——他大学多次逃课、熬夜搞项目，部分课程不及格，2014 年 6 月拿毕业证，学士学位因学分不够拖到 2015 年春节后才补齐（\"在学校也很宽容，毕业后还可以补\"）。这种\"宽容\"是他反复强调的关键变量。这段时间他做了三件出名的事：\n\n| 事件 | 做法 | 结果 |\n|---|---|---|\n| 社交网站 Tag Tag Me | 实时视频聊天，画面随聊天时长去马赛克，女生可不变清、男生强制变清 | 首晚 1 万+次通话、成了几对，但男女比失衡、强运营缺位，快速流失 |\n| 打卡人际图谱 | 爬体育打卡数据，按共同打卡频次画关系图（蓝=男、粉=女、紫=异性≈情侣） | \"激情十字架\"（一寝室四男互连）等趣味发现，纯好奇无商业化 |\n| 入侵教务邮箱 | 注入漏洞进入老师邮箱看到试卷成绩，写日志证明可行性但关键步骤打码 | 未下载未篡改，但严重损害学校声誉 → 留校察看（未开除） |\n\n社交网站失败的根因，是他当时对互联网产品的认知还停留在\"产品好就能自传播\"：\n\n> \"这类产品是强运营的东西，它涉及到你怎么做冷启动、怎么促活……但那个时候对这块完全没有认知。\" — 刘靖康\n\n留校察看是关键的一击——不是因为处分本身，而是他第一次看到父亲落泪：\n\n> \"我第一次见到父亲眼泪掉下来……那个事情其实是更大的负反馈，那个时候就真的知道自己这次真的是做过了。\" — 刘靖康\n\n罗永浩点出了这种成长的\"幸运结构\"：\n\n> \"恰好通过这种不是让你下牌桌的负反馈，让我知道边界在哪里，知道别人是怎么考虑这个事情的，然后调整自己的想法跟行为。\" — 刘靖康\n\n### 时代的宽容：另两件出名的事\n\n刘靖康当年还有两件更出圈的事——爬了学校网络上 7000 张学生照片合成一张\"标准脸\"，以及破解周鸿祎的电话号码。这两件没出事，靠的是当时社会与当事人的宽容，他对此有清醒认知：\n\n> \"那次没事，是因为那时候整个社会氛围、微博，大家都觉得这很有意思，当成个娱乐事件看……但我觉得周总的表态很关键——如果他当时是追究的态度，风向就不一样。但他非常宽容，还抛了橄榄枝（李开复、周鸿祎都邀约过），那大家就把它当娱乐事件看。\" — 刘靖康\n\n罗永浩也感慨\"那个时期有一种氛围真的挺开放的\"——同样的事换个年代、换个当事人态度，结局可能完全不同。\n\n> 💡 **萃取：**最有价值的成长不是\"没犯错\"，而是\"在足够宽容的环境里犯了不致命的错并吃到清晰负反馈\"——组织（或家庭）的真正护栏作用，是把毁灭性后果挡在外面，同时让当事人完整承受教训。同一个越界行为是\"创新动能\"还是\"毁灭路径\"，很大程度取决于环境和关键人的一念之宽容，这对带新人/带孩子都是一条硬提醒。\n\n---\n\n## 四、创业转折：从直播到全景相机（VR 证伪）\n\n创业初期做 To B 直播软件，品类小众、商业模式不清。转机是偶然看到俄罗斯团队用 6 个 GoPro 航拍 360 度视频，深受震撼——意识到\"即拍即得的 360 度体验\"存在巨大机会，品牌取名 instant（中文\"影石/三水\"）。\n\n最初定位是 VR 内容采集，但 2015-16 年 VR 普及预期被快速证伪。真正的转折来自用户行为观察：\n\n> \"观察到 Facebook 用户小组中有用户将产品绑在头盔骑行、或用自拍杆滑雪拍摄……运动爱好者难以把握拍摄角度，360 度录制后可回放选帧。\" — 刘靖康（市场再定位）\n\n于是转向**全景运动相机**——这是消费级全景运动相机品类的真正开创（此前理光偏静态、三星配自家 VR、诺基亚是 8-11 摄像头的专业机；GoPro 是发烧友 DIY 六台拼接，官方一两年后才跟进）。\n\n```mermaid\nflowchart LR\n    A[\"To B 直播软件<br/>品类小众/模式不清\"] -->|看到 6×GoPro 360 航拍| B[\"instant 全景相机<br/>定位 VR 内容采集\"]\n    B -->|VR 普及证伪| C[\"观察真实用户行为<br/>头盔骑行/自拍杆滑雪\"]\n    C -->|回放选帧解决取景难题| D[\"全景运动相机<br/>开创消费级新品类\"]\n    D --> E[\"先卖 B 端婚纱/中介<br/>(成本高、被迫)\"]\n    E --> F[\"消费级 One 引爆<br/>全球化 + 网红教育市场\"]\n\n    style A fill:#e5e7eb,stroke:#6b7280\n    style B fill:#fee2e2,stroke:#dc2626\n    style C fill:#fef3c7,stroke:#d97706,stroke-width:3px\n    style D fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n    style E fill:#fef3c7,stroke:#d97706\n    style F fill:#dcfce7,stroke:#16a34a\n```\n\n创业决策并非完全理性——\"酷\"是重要动因，但背后必须有商业前景支撑。早期产品因工艺/成本（3000-4000 元）难做 To C，被迫先卖给婚纱摄影、看房中介等 B 端生产力场景。\n\n> 💡 **萃取：**新技术不必然带来新场景；带动品类增长的是\"够大、够刚、需求满足度够高、完成度够高\"的具体场景。判断一个硬件方向能不能起来，别看技术多炫，要看它落在哪个 solid 场景里、以及\"是否有人在这个场景里真的赚到了钱\"。\n\n---\n\n## 四·五、融资生死线与\"三个勇敢的决定\"\n\n### 创业自筹 15 万 → IDG 400 万救命\n\n首个直播 App 起源于一个朴素而动人的需求——记录\"以后可能再也见不着\"的瞬间：\n\n> \"快毕业时同学搞很多 party、演唱会，但好几个校区很多人到不了现场，现场氛围又很好，大家平常只能拍个照发人人网。所以我想怎么通过手机把现场氛围传到其他校区，同时自动保存下来——因为大家以后可能再也见不着了，希望把这种氛围记录下来。\" — 刘靖康\n\n（注意：这个\"记录稍纵即逝、不可重来的真实瞬间\"的母题，从直播 App 一直贯穿到全景相机、再到他对 AI 时代的判断——是他十年没变的产品初心。）自筹 15 万（家里借的），快毕业时快没钱，IDG（与创业帮）投了 400 万。\n\n> \"如果没了 400 万，可能毕业的时候就解散了。\" — 刘靖康\n\n这次创业他对\"被忽悠进来的学弟学妹\"心怀愧疚，也展现了他对\"环境/安全感\"的一贯归因：\n\n> \"我那时候比较自私——对我个人来讲，创业失败靠父母还能活一段时间，而且 nothing to lose，本来什么也没有……真正对不起的是那些学弟学妹，本来正常毕业可以拿到我们 offer 好几倍的工作，跟着我创业失败，会损失刚毕业头几年宝贵的黄金职业发展期。\" — 刘靖康\n\n直播没做下去有两个原因，第一个和社交网站一模一样——**又轻视了运营**（先有鸡先有蛋、商业模式不清，且讲座这类学习内容是细分品类，多数人更爱娱乐）；第二个是\"有了外遇\"——看到 360 度视频被深深震撼，而且发现\"现成的 360 拍摄体验差到不可接受\"正是机会所在：\n\n> \"360 视频画面很震撼，但我们去了解怎么拍，发现很难：得 3D 打印一个框、买六七个 GoPro、花几万块钱，拍完还要在电脑里用很复杂的软件花好几天拼接，才能出一段全景视频。但那时候普通相机的体验已经是即拍即得、拍完屏幕马上能看。\" — 刘靖康\n\n> \"回过头看他投我们，也不是觉得一定是这个方向，我觉得看人嘛，更多还是看人。\" — 刘靖康（IDG 那期 90 后基金成的项目大概只有四层）\n\n### 启明 / 迅雷：一个差点丢掉的 demo\n\n转型时账上 400 多万只剩 100 万出头，全拿去做 demo 去 pitch。启明创投看着手戳的 demo 投了——但差点当场泡汤：演示时让 IC 戴 VR 头显看会议室外相机的实时传输，用了临时路由动态分配 IP，现场死活连不上，是同事冷静地敲命令查 IP 列表、手动配置才连上。这种\"关键时刻有人顶得住\"的隐性团队能力，和后来供应链\"持续不犯错\"是同一种气质。2015 年 3 月启明（VR 极乐观期）、2016 年迅雷投 900 万美元，此后很快自我造血。\n\n第一个直播 App 用的也是省钱的工程巧思（这也是它没怎么花钱的原因）：\n\n> \"那个网站是我自己一个人写代码传出来的……用的技术是 P2P，并不需要一个中心服务器去分发大量流量，我们有个服务器大概几百块钱一个月，只用去做地址交换，真实的流量是 P2P 的，他们的电脑直接传输。\" — 刘靖康\n\n### 三个勇敢的决定\n\n罗永浩复盘刘靖康在演讲里说的\"毕业时三个勇敢决定\"：\n\n| 决定 | 勇敢之处 | 实质 |\n|---|---|---|\n| ① 毕业就创业 | 拒掉好 offer 和很好的\"国家单位\"，压力主要来自家人 | 父母希望孩子\"平安健康稳定\"，不是大风大浪 |\n| ② 二次创业挑战世界巨头（GoPro） | 账上钱不多、对手垄断 | 用新品类（全景）侧翼切入 |\n| ③ 内部巨大压力下仍启动无人机 | 大疆绝对垄断、烧钱长链条 | 为\"能力站升维\"和使命愿景 |\n\n第一个决定其实比看上去更难——拿到很多 offer 和不错的\"国家单位\"，真正的压力来自家庭：\n\n> \"那个时候主要的压力来自周围和家里——毕业时还是拿到了挺多公司的 offer，也有很好的国家单位，最后还是跟家里沟通好才去创业。\" — 刘靖康\n\n（罗永浩调侃\"你当时都那么敢惹事了，创业算啥呢\"，但刘靖康强调走出第一步仍是想了好几年、下了很大决心。）\n\n第三个决定（无人机）内部其实做过一次\"灵魂拷问\"式的假设性对话，结果反而印证了使命愿景的牵引力大于对竞争的恐惧：\n\n> \"我们也问过公司核心团队：如果今天大疆承诺不做全景相机，我们能不能承诺不做无人机？大家想想还是看一下客户需求跟使命愿景，还是决定做无人机吧。\" — 刘靖康\n\n> 💡 **萃取：**同一个坑会以不同形态反复出现——他两次创业（社交、直播）都栽在\"轻视运营/先有鸡先有蛋\"上。创业者真正的成长不是不犯错，而是终于认出\"这又是同一个错\"，并在第三件事（全景相机）上提前为运营和市场教育留出资源。\n\n---\n\n## 四·六、为什么全景\"适合记录、不适合分享\"\n\n一个反直觉但极深的产品判断：全景内容（360 度）最适合的是**记录**，而非分享/创作——因为它**没有镜头语言**（推拉摇移、特写中近全景的组合）、无法控制观众视点。\n\n> \"比如看一个爱情片，男女正深情拥抱时，观众可能看到了旁边那个厕所——他就没办法完成导演想完成的目的。\" — 刘靖康\n\n> \"结婚时所有人手机都对着新郎新娘，但那个时候你的父母是在流泪的，以前没东西拍下来。包括小朋友刚学会走路时父母的表情……所以它特别适合作为自己的回忆，但不那么适合作为分享。\" — 刘靖康\n\n这正好对应他反复用的\"影像三需求\"——记录是全景的主场。\n\n> 💡 **萃取：**一个产品形态的\"技术先进性\"和它\"适配哪种需求\"是两件事。全景技术上能拍下一切，但因为缺少镜头语言（无法引导注意力），它在\"表达/分享\"上反而弱——评估任何新形态，要先问它天然服务哪个需求，而不是默认\"更全=更好\"。\n\n---\n\n## 五、硬件硬功夫：供应链是 49% 的功劳\n\n### 教训：不要急着把产品推向市场\n\n2020 年初的模块化相机是印象最深的品控事故：为赶 CES 发布，可靠性测试不足，上市后暴露连接不稳定、起雾等问题，又叠加疫情停工——多重打击叠在一起，教训极深。值得注意的是，正是同一年他们仍决定启动无人机（在最艰难时做最大的能力投资），可见\"能力站升维\"这条主线的优先级。\n\n> \"做这个事情的教训就是 don't rush your product to the market……硬件不像软件升级个 OTA 就行了。\" — 刘靖康\n\n> \"持续不犯错的确是这个行业的一个隐性门槛，因为你有一代犯错之后，会把之前积累的信任跟口碑又倒推重来。\" — 刘靖康\n\n> \"如果一个产品造成了不好的口碑，要用两到三个甚至四个才能扳回来。因为用户出的是真金白银，所以特别不原谅，你即使给他全换了也不原谅。\" — 罗永浩 / 刘靖康共识\n\n### 供应链管理的四个层面\n\n最初对供应链毫无认知，良率极低、多家工厂拒接，第一批产品是团队自己赴厂手拧螺丝（\"供应商不想做了，我们就硬推着他做，甚至没经过同意就上阵拧螺丝，这挺违反工厂规矩的\"）。后与 Skyline 天才（原 GoPro 制造商）合作解决可制造性，再引入深圳相机/行车记录仪/执法记录仪领域的供应链总监。最隐性的一层坑是\"一级供应商背后的二级供应商\"：\n\n> \"比较隐性的坑是在一级供应商后面的二级供应商，他选的二级可能不靠谱，我们有时没识别出来，就会导致交付的数量准确性、质量都出问题。所以供应链不纯粹是供应链问题，它还耦合着质量管理和制造工艺。\" — 刘靖康\n\n```mermaid\nflowchart TB\n    Core[\"供应链 ≠ 单纯供应链问题<br/>质量管理 + 制造工艺 + 供应链 耦合\"]\n    Core --> L1[\"① 可制造性<br/>结构件工艺与良率<br/>(前置没做好→后端必崩)\"]\n    Core --> L2[\"② 供应商能力评估<br/>不能只看报价低<br/>(挖坑→拖上市节奏)\"]\n    Core --> L3[\"③ 质量管理<br/>派人驻厂看良率/工艺<br/>(承诺≠真能交付)\"]\n    Core --> L4[\"④ 二级供应商风险<br/>一级背后的二级不靠谱<br/>(隐性坑)\"]\n    L1 & L2 & L3 & L4 --> Out[\"量↑ → 产业链成本自然下降<br/>前提：得有人先赚到钱\"]\n\n    style Core fill:#dbeafe,stroke:#2563eb,stroke-width:2px\n    style L1 fill:#fef3c7,stroke:#d97706\n    style L2 fill:#fef3c7,stroke:#d97706\n    style L3 fill:#fee2e2,stroke:#dc2626\n    style L4 fill:#fee2e2,stroke:#dc2626\n    style Out fill:#dcfce7,stroke:#16a34a\n```\n\n> \"如果一个消费电子或硬件公司要成功，起码有一半，你说 49% 吧，功劳是跟供应商有关系的。\" — 刘靖康\n\n这也正是中国硬件难以被全球追赶的根本——罗永浩点出：\"全世界做硬件尤其智能硬件都没法跟中国竞争，中国供应链这个优势跟全世界是断崖式领先；那边也有聪明勤奋的年轻人想创业，但软件可以、硬件一碰就发现这个差距。\"\n\n装配委托给天才、立讯等供应商，但 SOP 和生产工艺由内部自研。一个无法复用手机经验的典型可靠性坑：\n\n> \"你觉得电池装上去就会稳态供电吗？不是的。在不同车把上、不同频率的震动下，它有概率会断电——断电表现就是相机突然死机关机。这在手机里基本不会遇到，因为手机是不可更换电池的硬连接。\" — 刘靖康\n\n中国供应链是断崖式的结构性优势，这也是刘靖康坚持最终要回到\"软硬结合\"的底层原因：\n\n> \"如果软件硬件都能做、杀到海外去，你的海外竞争对手硬件上已经直接投降了，他只能去跟你谈软件。\" — 刘靖康\n\n### 案例：罗永浩\"坚果一代电池爆炸\"——长链条里的小数概率会要命\n\n罗永浩讲了一个把\"长链条 + 小概率\"具象化的惨痛 case，是对\"持续不犯错\"最好的注脚：坚果一代千元机为了好看做了可换后盖（省掉一层电池保护壳让机器更薄），打开盖后用印刷字提醒\"电池不能抠\"——但设计师为了好看，在黑色电池包上印了深灰色字，光线下根本看不清。\n\n> \"人是这样的，他拿小刀、螺丝刀抠过了，发现抠不出来又把盖盖回去，过了三个星期这个被抠过、被挤压过的电池要么炸、要么鼓包……出去才十几万台就爆了三个，行业标准是万分之三，那我们就差了十倍。真的是手脚都麻、要尿裤子的程度。\" — 罗永浩\n\n最后供应商用昂贵设备从燃爆残骸里取证，结论是\"每一个都被抠过\"，但消费者几乎都真诚地否认（\"他也不是坏人、不是骗你，他就下意识记不得，甚至潜意识里否认\"）。技术上无解，建议是\"不做任何技术改动、接着卖，但全部用醒目刺眼的大红字写不能抠\"——回炉重印后再没炸过。\n\n> \"为什么企业做大了要在这不断投入？那是看不见的、消费者感知不到的投入，但那个投入很恐怖——有时为了把 DOA 降低一点点，整条链路都得加很多措施、成本和 checklist。\" — 罗永浩\n\n> \"软件犯错成本比较低，做硬件真的是如履薄冰，而且公司规模越大、犯错成本越大，所以这个心情从来不会放松。\" — 刘靖康\n\n珠海有小型自有工厂，主要负责复杂配件组装和新品试产线。\n\n> 💡 **萃取：**硬件的护城河不在\"会不会做\"，而在\"长链条上每一环不能犯大错、且要持续不犯错\"。这是一种隐形的、靠时间和真金白银学费堆出来的能力，后来者用钱和聪明都难快速买到——这正是它比软件更难、也更稳的地方。坚果电池这个 case 还多一层提醒：致命风险常藏在\"为了好看/省成本而省掉的那一层冗余\"里，越是细枝末节的妥协越要在长链条里反复推演最坏情形。\n\n---\n\n## 六、出海与\"社交货币\"式增长\n\n为什么早早就全球化？早期靠京东众筹起步，但担忧国内低价竞争会冲击品牌，于是决定优先打海外——欧美成熟的户外运动文化是天然助力。出海整体顺利：先找 agency 做早期 go-to-market，媒体曝光后自然吸引代理商主动来买货。但买断模式踩了一个\"前高后崩\"的大坑——表面火爆其实是渠道囤货，真实需求没起来：\n\n> \"意料之外的是当时低估了 marketing 和教育市场的必要性，没怎么做这事。导致很多消费者不会去搜索这个品类，也不会到线下问，所以很多货就烂在代理商手里，代理商就不再下单——我们头几个月每月都有 2000 万，等代理商买走，第三、第四个月就断崖式下降。\" — 刘靖康\n\n破局靠两点：把产品重新定位成运动相机去教育市场，并抓住 YouTube 网红红利（彼时 YouTuber 快速增长、大量接推广测评）按 GoPro 路径打。一个最初没料到的红利是——设备拍出的炫酷内容本身成了**社交货币**，在网上免费自传播。用户社群也成了创意来源（收集 Ins/抖音优质内容买授权做广告、把好创意转成 App 内可复现的模板）。\n\n去年国内占比 20% 出头，海外仍是主力。最大市场是美国和中国（中国增速超预期），而印尼是个\"超出想象\"的增长点——刘靖康特意纠正了对印尼的刻板印象：\n\n> \"印尼增长速度非常快，而且印尼经济其实挺好的，年轻人玩视频也特别多。\" — 刘靖康\n\n社区运营上：海外靠自有论坛 + Reddit（比 Facebook 活跃）+ App 内内容/玩法社区；国内没有集中发帖地，但抖音的标签化系统让相似兴趣的人互相看到，是一个\"隐性但庞大\"的社区。全球协作靠飞书——自动翻译、显示各地同事当地时间、创建日历时提示时间冲突、会议总结/实时字幕，而最好用的是多维表格（长协作流公司靠它管\"谁做什么、做到什么程度\"）。\n\n> \"强协作的公司，飞书还是挺适合……'先进企业先用飞书'，能很好概括飞书的客户画像。\" — 刘靖康 / 罗永浩共识\n\n> 💡 **萃取：**当你的产品被用户用来\"展示自己\"时，每一次用户晒图都是你的免费广告——这种自传播不是规划出来的，多半是做着做着发现的。值得主动去问：我的产品能不能成为用户的社交货币？\n\n---\n\n## 六·四、如何\"围攻\"GoPro：不是替代，是扩容\n\n外界把影石对 GoPro 解读为\"以小博大\"，但刘靖康的真实打法是**降维 + 扩容**，而非正面替换。逻辑分三步：(1) 在部分场景对传统运动相机形成\"等效替换 + 渗透\"（如滑雪场，全景运动相机比传统机更好用）；(2) 凭软件迭代和出新速度快很多形成能力差；(3) 最终用三类产品（全景运动相机 + 拇指相机 + 带翻转屏徕卡色彩的广角 vlog 机）画一个比 GoPro 更大的圈。\n\n> \"你在有些场景下等效替换，同时又扩展了这个场景里品类的渗透率……雪场里拿全景运动相机的总人数会比以前拿运动相机的人数多，所以它既是渗透，也是扩容。\" — 刘靖康\n\n```mermaid\nflowchart TB\n    GP[\"GoPro 的圈<br/>(传统运动相机)\"]\n    P1[\"全景运动相机<br/>滑雪/骑行等景深场景\"]\n    P2[\"拇指相机(磁吸)<br/>第一人称不再'社死'\"]\n    P3[\"广角+翻转屏+徕卡色彩<br/>更适合 vlog\"]\n    P1 & P2 & P3 -->|部分替换 GoPro| GP\n    P1 & P2 & P3 --> Bigger[\"三圈相加 >> GoPro 的圈<br/>= 市场扩容(本质是增量)\"]\n\n    style GP fill:#e5e7eb,stroke:#6b7280\n    style P1 fill:#dcfce7,stroke:#16a34a\n    style P2 fill:#dcfce7,stroke:#16a34a\n    style P3 fill:#dcfce7,stroke:#16a34a\n    style Bigger fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n```\n\n这背后还藏着一个对消费电子市场预测的方法论修正——别靠分析师报告外推：\n\n> \"消费电子市场很难根据过去的数据去归纳和预测，它更多跟你的产品定义有关系。你的产品是否解决了一些场景里没解决的问题，如果是，它就不只是对原有方案的渗透，而是对市场有效的增量。\" — 刘靖康\n\n所以\"营收超过 GoPro\"对他只是自然结果而非目标——\"我们的目标是把整个市场扩容，而我们是扩容里最大的受益者\"。他特意澄清了被媒体放大的\"干死 GoPro\"叙事：\n\n> \"我们其实从来在外部跟内部都没有讲过要干死 GoPro 这种说法……但冲突容易产生传播，所以很多人喜欢说谁干死谁、谁降维打击谁、谁碾压谁，事实上从来不是我们的起心动念。\" — 刘靖康\n\n（GoPro 反应为何那么慢仍是个谜——刘靖康只给事实不下结论：\"他们创始人在上市第一年就套现了 7.5 亿美金。\"）\n\n> 💡 **萃取：**挑战垄断者最稳的姿势不是\"在它的圈里把它打败\"，而是\"用几个新形态各切一块、相加成一个更大的圈\"——把零和替换变成做大蛋糕的扩容。对增长的判断也随之改变：成熟市场的天花板不是分析师报告里的数字，而是\"还有多少没被满足的场景没人解决\"。\n\n出海到一定规模必然撞上专利。GoPro 把影石当严肃对手的最显性信号，就是约一年前 4 月对它发起的 337 调查。刘靖康正应诉 6 起专利官司，花了超 1000 万美元，最显性的就是这起美国 ITC（贸易委员会）的 337 调查——不要求赔偿，但初裁/终裁若认定侵权可直接停售。这起案子他能感受到\"比较强烈的恶意\"：\n\n> \"他 claim 的那些专利，如果成立的话，所有手机厂都会侵权。\" — 刘靖康\n\n结果：\n\n> \"六件专利里，我们只有一件外观专利被法官认为侵权，提交了更新设计；其他要么不侵权、要么专利本身无效。\" — 刘靖康\n\n外观专利反而棘手：其他专利可通过 OTA 删改功能规避，外观专利只能改设计、重新发货到美国。判定逻辑也很微妙——主观上影石是红色、第一印象不像，但外观专利比的是主要立面的线框图，线框图上\"觉得像，那就没办法\"。\n\n### 专利流氓（NPE）的两种模式\n\n> \"专利流氓大概两种策略：一种是手上有个很 solid 的专利，告谁谁都得认输，批量去告再谈价格；另一种是专利没那么 solid，但你打官司的成本明显比他要求的金额多——类似收保护费。\" — 刘靖康\n\n某些地区法院临时禁令很容易批（不论述专利是否有效，面上侵权就可下架），而正式 reverse 要走一年程序，这一年产品停售，谈判极度被动。\n\n### \"真像黑社会\"——专利联盟\n\n罗永浩讲了一个亲历的经典 case：碰到绕不过去的专利、对方开天价，正一筹莫展时，一个大供应商主动来问\"你们明年能下多少订单？\"——\n\n> \"他说我们是另一个专利联盟的，如果你明年订单数能让我跟我老板交代，我们就内部申请，用我们这个专利联盟的能力去跟那边律师打个招呼。如果大家都有老大罩着，这事一般就和解了。\" — 罗永浩\n\n承诺订单量后两三周，案子就撤了。加入专利联盟本身要缴会费、获得\"老大\"庇护，可用联盟专利反击他人——这套机制运转起来确实像江湖：\n\n> \"或者别人会保护你，告诉那个流氓头子'这个是我的兄弟，就过去'——特别像黑社会，当年把我笑坏了。\" — 罗永浩\n\n> \"我当时就强烈地感觉，原来合法合规的运营现代化的企业，有些事也跟黑帮差不多。\" — 罗永浩\n\n刘靖康的态度务实而克制：专利制度未必合理，但它存在且有完整产业链（NPE + 辩护律师 + 文化），不可能消失；原创者的强专利该尊重、该给好处，\"它就是企业运营的一部分成本\"。来自专利流氓的诉讼不会威胁生存（对方求财），无非是谈判与运营成本。\n\n> 💡 **萃取：**全球化到一定规模，专利不是\"会不会被告\"而是\"被告时有没有筹码\"。筹码往往不在法律本身，而在你的订单量、供应链关系、所属联盟——把它当作和供应链管理同级的\"运营成本\"提前布局，而不是临阵当法律问题硬扛。\n\n---\n\n## 六·六、上市、危险时刻与 momentum\n\n### 为什么选科创板\n\n上市的两个原因：(1) 有持续募资平台（研发投入需要长期资金）；(2) 兑现对早期忽悠进来的员工和投资人的合理回报（高风险产物需高回报）。选科创板是因为它当时是国内唯一对\"亏损企业\"宽容的板——契合消费电子\"高投入、高回报、长周期、也高风险\"的特性。\n\n### 两个危险时刻\n\n> \"一个是 2017 年 Nano（插手机那个）做得一般般，开始做 One 的研发阶段，账上只剩 6000 万、公司大概 200 人——200 人配 6000 万其实不是个特别稳的状态，没法让公司有 18 个月的安全垫，那个时候比较危险。\" — 刘靖康（自陈对安全感要求高）\n\n> \"另一个可以算是此刻——跟大疆的全面竞争，新品类、老品类都在全面竞争。有时危险不在于公司剩多少钱，而在于整个 momentum 一旦掉头，就容易兵败如山倒。\" — 刘靖康\n\n上市没改变团队心态，他用一句很精准的话概括物质与热爱的分工：\n\n> \"我们肯定不会否认物质层面对大家的激励，但它只决定了大家表现的下限……performance 更重要的是对事情的认可跟 passion。物质激励决定下限，热爱决定上限。\" — 刘靖康\n\n敲钟用全景相机拍摄（\"蓄谋已久\"、镜头很硬没敲坏）；罗永浩补充了纳斯达克/陌陌上市时的\"氛围感设计\"印证仪式感的威力——纳斯达克不敲钟、楼又矮又小，正当观礼的人略感扫兴时：\n\n> \"他拉着我们走一个像破胡同的小路，又上楼又下楼，到了路边突然所有屏幕都变成上市公司的——当时是陌陌，logo 蓝底白字，整个时代广场天上的屏幕都变成蓝色，那一瞬间我们寒毛竖起、脑袋发麻。其实是设计过的。\" — 罗永浩\n\n> 💡 **萃取：**对成长型公司，真正的生死指标常不是现金余额，而是 momentum（势能/增长方向）。现金充足但势能掉头同样致命——管理者要把\"势能是否在掉头\"作为和\"账上还剩几个月\"同等重要的预警信号。\n\n---\n\n## 七、对 VR / AR 的判断（与罗永浩深度交锋）\n\n刘靖康对 VR 普及偏悲观、对 AR 眼镜偏乐观，核心判据始终是\"是否有够大、够刚、满足度高的场景\"。\n\n```mermaid\nflowchart TB\n    subgraph VR[\"🟡 VR 头显 — 偏悲观\"]\n        V1[\"solid 场景少<br/>gaming 是细分/生产力工具\"]\n        V2[\"观影需求广但<br/>重量设计不是好 PMF\"]\n        V3[\"实时 AIGC 改造场景<br/>受算力限制 暂不成立\"]\n    end\n    subgraph AR[\"🟢 AR 眼镜 — 偏乐观\"]\n        A1[\"室内外都能用<br/>天然场景比 VR 多得多\"]\n        A2[\"观影已被 Xreal/雷鸟验证 PMF\"]\n        A3[\"生产力工具自然发生<br/>认人/提醒待办→愿付费\"]\n        A4[\"无杀手级应用<br/>但大量细分应用堆叠<br/>量变→质变\"]\n    end\n\n    style VR fill:#fef3c7\n    style AR fill:#dcfce7\n```\n\n对 Meta 砸钱做 VR，两人有一个犀利共识——**互联网巨头补贴硬件，反而伤害了产业**：\n\n> \"Meta 的发心更多是恐惧驱动——对手机厂 OS 的恐惧，想在终端层面占据自己的位置。但它节奏没踩对：高举高打、一下铺很多强运营的场景，给消费者很高预期却没 deliver，进入低活跃、低留存的恶性循环。\" — 刘靖康\n\n> \"因为引导它的不是硬件巨头而是互联网巨头，这家决定亏钱卖，结果导致只有他能做……如果产业要烧掉 3000 亿才能转正，他自己烧 900 亿，剩下 2100 亿没着落，而且很多本来能进来贡献的头脑也进不来了。\" — 罗永浩\n\n罗永浩还分享了自己 2022 年做 AR 眼镜的惨痛复盘：跑了六七十家供应链得到\"很乐观\"的草率结论，但第一代工程机做出来才发现底子差到——不能像精神病、要全日续航、要 always on、发热贴着肉两度就冒汗——\"改善 1000% 也不够用、2000% 也不够用\"，估计十年都做不出真正意义上的消费级计算平台。\n\n### 插曲：被严重低估的\"眼神交流\"刚需\n\n聊到 AI 改造场景时，罗永浩抛出一个他亲身痛点、且愿意\"多少钱都想买\"的需求——远程会议里的眼神对不上：你看屏幕里的人脸，但摄像头不在脸的位置，于是对方看到的永远是你在看别处。刘靖康顺势点出这是个被低估的真需求，而且现有 AI 矫正方案有天花板：\n\n> \"眼神交流是在线会议里面被严重低估的一个需求……即使是 AI 脑补眼神，问题是它没办法反映对方真实的眼神——眼神里有时往左下角看是迟疑，你对内容感兴趣时会进一步靠近、看着对方眼睛，但现在的在线会议都没解决这些。\" — 刘靖康\n\n> \"我们面试为什么面对面要比远程准得多？就是因为这些信息都被弄掉了。对方的肢体语言，都没经过你大脑的明文思考代表什么意思，它就被动地反映出来、影响你的判断，但在线会议会把这些抹掉。\" — 罗永浩 / 刘靖康共识\n\n这段对教育/管理直接相关：远程面试、远程 1v1 之所以\"测不准\"，正是因为大量未经明文思考的非语言信号被信道抹掉了。\n\n> 💡 **萃取：**判断一个新硬件平台能否起飞，先问两件事——(1) 有没有\"够大够刚、满足度高\"的 solid 场景；(2) 是不是一个健康的生态（很多公司分别打磨 PMF、且有人真的赚到钱）。单靠一家巨头补贴硬件、把别人挤出场，往往把产业做小而非做大。\n\n---\n\n## 八、对 AI 的判断：改变形态，消灭不了\"真实\"\n\n2023 年初看到 GPT 时震撼，但\"觉得它是个不错的工具，没意识到是范式变化\"。公司层面做了两件事：组织 ChatGPT 使用小组让人贴近；把 2018 年起做的自动剪辑做了一次**端到端重做**——这是全篇对\"AI 落地方法论\"最直接的一条经验：从\"CNN 检测 + 枚举代码规则\"的老范式（只能到 60 分），换成端到端训练，效果明显提升。关键在于这不是在旧流程上打补丁，而是换底层范式：\n\n> \"原来对无人机全自动拍摄信心不足，因为 CNN + 规则的方案只能达到 60 分水平。成功实现端到端自动剪辑后，反而增强了我对全自动拍摄机器可行性的信心，坚定了投入方向。\" — 刘靖康\n\n罗永浩抛出更吓人的问题：会不会 AI 让你用普通手机随手拍两张、再拍张脸，就直接生成一整本相册？刘靖康用\"影像三需求\"框架拆解：\n\n```mermaid\nflowchart TB\n    Need[\"影像背后的 3-4 个需求\"]\n    Need --> Rec[\"📝 记录<br/>本质不变<br/>跟美化无关 只为日后重温<br/>AI 无法替代\"]\n    Need --> Share[\"📣 分享(装逼)<br/>双刃剑<br/>AI 把作品下限拉高(通货膨胀)<br/>但比拼仍靠'真实那部分'\"]\n    Need --> Create[\"🎨 创作<br/>快感来自过程本身<br/>(像亲手做蛋糕)<br/>AI 分担重复 不剥夺满足\"]\n\n    Rec --> Shape[\"AI 不改需求面<br/>但改产品形态\"]\n    Share --> Shape\n    Create --> Shape\n    Shape --> Form[\"跟拍无人机=部分实拍+AI补全<br/>全景相机=AI脑补未拍区域<br/>→ 可能反过来消灭一部分需求\"]\n\n    style Need fill:#dbeafe,stroke:#2563eb,stroke-width:2px\n    style Rec fill:#dcfce7,stroke:#16a34a\n    style Share fill:#fef3c7,stroke:#d97706\n    style Create fill:#dcfce7,stroke:#16a34a\n    style Shape fill:#fef3c7,stroke:#d97706\n    style Form fill:#fee2e2,stroke:#dc2626\n```\n\n**关于\"创作\"（AI 是分担不是剥夺）**，他用了两个精妙类比——调酒与手动挡：\n\n> \"调酒正常你要发泡得自己摇，但有发泡液滴两滴下去就行，这不会影响他调酒的热情——它把大量重复枯燥的东西简化了，让他有更多主观发挥的部分。就跟有人喜欢开手动挡一样。\" — 刘靖康\n\n所以 AI 会让创作人群\"缩小一点但更稳定\"——留下的是真正享受过程的人。\n\n**关于\"分享/装逼\"**，他给了一个极锋利的产品洞察（抖音 AI 转场为例：前半段游戏画面+后半段真实滑雪，点赞高的原因恰恰是大家在看\"真实那部分谁更帅、有没有真的后空翻\"）：\n\n> \"AI 整体丰富了画面表达，把作品的下限提高了。但人们在分享上比拼的是谁最牛，所以还是依赖你真实那部分……一定程度它就是分享层面的通货膨胀，但通胀之后就像有钱人都差不多有钱了就开始比收藏什么——人类底层最终还是会通过真实的部分去证明自己独一无二的价值。\" — 刘靖康\n\n罗永浩顺着补了两个绝佳的\"装逼通胀\"现实例子——金子→名画、司美格鲁肽减肥：\n\n> \"大家穷的时候都想有金子，等到家里都堆满金块时，就会有人说我这个没品、我是收藏名画的……司美格鲁肽出来后减肥变容易了，一大批人减了肥晒，等大家都知道这事后，减肥成功就不能证明你自律了，于是就有人强调'我是硬减的、靠毅力'。\" — 罗永浩\n\n（这段还有个真实注脚：刘靖康为上节目一个月硬减 10 斤——\"靠药作弊好像也不太好，还是怎么证明自己有坚强意志，这个比吃药要管用、你吃药就装不了这个\"——本身就是\"真实性=社交货币\"的活体演示。）\n\n罗永浩还用围棋类比佐证：\"半假\"和\"全假\"是两回事：人类被 AlphaGo 击败后，学棋的孩子没大规模消失，观众仍爱看人和人下棋——\"半假人类能接受（化妆、美颜都是半假），全假接受不了\"。\n\nAI 还带来一个反直觉的商业利好——它在帮所有人**重建\"为软件付费\"的习惯**，这恰恰是过去互联网行业最缺的：\n\n> \"今天 AI 计算成本并不低，连即梦、豆包、Google 这么有钱的公司高级版都得收费。以前互联网公司为什么要搞广告、搞'羊毛出在猪身上'这种乱七八糟的商业模式？不就是因为客户没有为软件付费的习惯吗？AI 带来的机会是在大批量教育用户为软件付费——所以将来做硬件的公司，相当大部分收入可能来自软件。\" — 刘靖康\n\n### 不靠 AI，影像未来三五年还能往哪走\n\n刘靖康给了三个方向，其中两个反直觉、对\"硬核拼不过就拼情绪\"很有启发：(1) 显性的小型化、长续航、无感轻便；(2) **仪式感本身就是需求**——很多人买相机不纯是为了那张照片，而是机械快门、拍立得吐照片那一刻的感觉（大疆 Pocket3 的旋转屏就是巨大情绪价值）；(3) **记录范式的变化**，尤其和小朋友相处——\n\n> \"跟小朋友的相处里有很多稍纵即逝的东西，比如他讲了个很搞笑的事、做了个很搞笑的动作，但发生完你就没法拍下来，因为他不会再做第二次。记录层面还有巨大未被满足的需求，可以改变人们记录的方式。\" — 刘靖康\n\n> 💡 **萃取：**当一种能力被 AI 平权、人人都能拿到，差异化就会回流到\"无法被生成的真实\"上——真实性会成为新的稀缺资源和身份象征。任何\"用 AI 把结果做到完美\"的赛道，都要反问：我留给用户的\"真实/过程/亲历\"那一份还在不在？那才是长期溢价所在。而当\"结果\"被拉平后，\"过程的仪式感\"和\"稍纵即逝的真实瞬间\"反而升值——这对教育尤其成立：孩子某次主动开口、某个顿悟表情，是不可重拍的高价值瞬间。\n\n---\n\n## 八·五、为什么做无人机：需求背后的需求 + 能力站升维\n\n进无人机（大疆绝对垄断的领域）是\"三个勇敢决定\"的第三件。背后是三条逻辑，也是全场最系统的方法论。\n\n### 逻辑一：使命愿景——终极的\"自动拍摄与剪辑\"\n\n2016 年定下使命\"帮助更好地记录和分享生活\"。全景相机解决的是\"看烟花时眼睛盯着手机屏幕\"这种荒诞——他用迪士尼看烟花举了一个特别戳人的例子：\n\n> \"你去迪士尼看烟花，烟花很好看但稍纵即逝，大部分人会拿手机对着它——但你的眼睛其实在看手机屏幕，而不是看烟花本身。你好不容易遇到这个真实的场景，眼睛却看着屏幕，其实跟你看抖音没关系。你为什么要盯着屏幕？因为特别想把这美好记录下来。所以全景相机的作用是：只要把它打开，你就尽情享受当前的风景，它帮你把它记录下来。\" — 刘靖康\n\n但客户真正的需求不是\"参数多牛\"，而是\"把人拍好看\"。这有两个 gap：能力技巧（不会构图/剪辑）和\"没人帮你拍\"（一家三口合影都得求人）。自动剪辑（2018 起）解能力 gap；自动拍摄需要相机能在空间中自由移动——不可能给人形机器人买经济舱票，所以**只能是无人机**。罗永浩把这个终极形态总结得很到位，刘靖康也认可：\n\n> \"一个产品的终极形态应该是一个像活人一样的摄影师，能跟着你把各种东西都拍了，而且还能上天下地。\" — 罗永浩（刘靖康补充：无人机有它的局限性，比如室内很吵，所以终极形态不是永远飞着，而是\"全能型摄影师\"——像神话里能上天能下地能入水的角色）\n\n### 逻辑二：需求背后的需求（无限游戏 / 马车→汽车）\n\n公司内部有个\"需求背后的需求\"理论，逐层追问：\n\n```mermaid\nflowchart LR\n    Q0[\"客户：我要更好的马车<br/>(更快的马/避震/沙发座/空调)\"]\n    Q0 -->|做到世界第一也没到头| Q1[\"问：你为什么要马车？<br/>→ 更快从 A 到 B\"]\n    Q1 -->|更本质的解| C1[\"造汽车 / 新能源车\"]\n    Q1 -->|继续问| Q2[\"你为什么从 A 到 B？<br/>→ 上班/见客户/见供应商\"]\n    Q2 -->|更本质的解| C2[\"低延时远程通信<br/>(消灭一部分交通需求)\"]\n\n    DR[\"无人机三需求<br/>航拍出片/空间探索/送礼\"]\n    DR -->|背后的需求| DR2[\"怎样更简单地出片<br/>怎样像鸟一样探索空间\"]\n    DR2 -->|更本质的解| DR3[\"全景无人机<br/>体感操控:手指哪飞哪/眼看哪拍哪<br/>拍完可重调角度免构图失误\"]\n\n    style Q0 fill:#e5e7eb,stroke:#6b7280\n    style C1 fill:#dbeafe,stroke:#2563eb\n    style C2 fill:#fce7f3,stroke:#be185d\n    style DR fill:#fef3c7,stroke:#d97706\n    style DR3 fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n```\n\n> \"影像本身在很多市场是个无限游戏……你要看需求背后的需求。\" — 刘靖康\n\n落到无人机这个具体品类，他拆出三个原需求（航拍出片/空间探索/送礼），其中前两个的\"更本质解\"指向全景无人机——而且他对\"空间探索\"那部分的描述极有画面感：\n\n> \"买无人机主要三个需求：航拍出片、空间探索、送礼。航拍的痛点是你要花大量时间练构图、运镜；空间探索以前要盯着屏幕打杆。全景无人机相当于汽车之于马车的更本质解——运镜可以体感操控，手指哪里就飞哪里、眼看哪里就拍哪里，拍完还能重调角度不怕构图失误。\" — 刘靖康\n\n> \"从空间探索角度看，以前你盯着屏幕，现在整个眼球都被覆盖住，随便看哪里都行，就像一只鸟在天上飞——把人的肉体脱离物理限制，你可以从瀑布上面冲下来，可以飞到树上观测一只小鸟的生活状态，感受无比真实。\" — 刘靖康\n\n### 逻辑三：能力站升维 → 穿越周期（基业长青）\n\n2019 年去台湾/日本看存活几十年的公司，发现长寿的关键：(1) 抓住每隔六七年的机遇；(2) 机遇之间有**继承性**（如光学供应商：胶片相机→数码相机→手机→汽车→IoT，一脉相承、专注又变宽）。\n\n> \"一个创业周期的本质，其实不是公司每年的收入利润是多少，而是你怎么样可以健康地发展你的能力站，使得你在每一个周期里都有机会变成最伟大的选手。\" — 刘靖康\n\n> \"做无人机本质上是投资我们公司的能力站的生长……它牵引你的技术站变长、工程/制造/供应链/营销/渠道/服务能力都显著变好，极大增加穿越周期的生存能力。\" — 刘靖康\n\n他举华为/小米做新能源车领先、理想靠过去积累，都是\"能力站继承性\"的例子：\n\n> \"华为跟小米在做新能源车上明显是领先的两个玩家，这跟他们在手机时代积累的大量软件交互、营销层面的能力高度相关，使得他们在这些能力上相比其他新能源车厂明显有优势。理想也是，跟他过去的积累有关系。\" — 刘靖康\n\n而无人机对影石就是这种\"全面牵引\"的能力投资：\n\n> \"做无人机本质上是投资我们公司能力站的生长……基于三个原因——使命愿景（终极的自动拍摄剪辑方案）、巨量需求（像马车之于汽车的更本质解）、以及全面牵引公司能力成长穿越周期、基业长青——我们在 2020 年决定做这个事情。\" — 刘靖康\n\n> 💡 **萃取：**评估一个新业务，别只算它自己的收入利润，要算它\"是否牵引核心能力站升维、且与已有能力有继承性\"。最值得做的扩张，是那种\"做成了能复用到几乎所有未来品类\"的能力投资——它把一次性的产品胜负，变成了穿越周期的生存力。\n\n---\n\n## 九、知识的诅咒与产品交互\n\n技术出身团队曾高估\"炫酷功能\"的吸引力，掉进\"知识的诅咒\"——认为图标含义显而易见、用户点完这一步自然会点下一步，实际用户完全不懂、漏斗数据极差：\n\n> \"你觉得消费者天然就知道这个图标什么意思，但其实不是的；你觉得他点完这步会点下一步，其实也不是的。很多凭过去经验跟直觉做出来的交互，最后看漏斗数据非常差——消费者根本不知道这个图标什么意思，就不会去点。\" — 刘靖康\n\n改进机制是**图标盲测**——把\"我觉得显然\"换成可验证的硬指标：\n\n> \"我们以图标设计为例：设计师设计个图标，要先确定想表达什么意思，然后在公司内部找人盲测，十个人里七八个人说出来的意思跟你想表达的一样，这个图标才算通过；如果意见很分散就得重新设计。\" — 刘靖康\n\n水印策略也是一个反直觉案例：默认带水印、可取消。早期水印丑，多数人取消；优化到足够美观后，水印反而成了画面\"高级感\"的一部分、提升品牌识别和保留率。\n\n人才上最难招的不是软件/技术产品经理（研发背景 + 需求转化能力强的相对好招），而是兼具硬件结构与软件工程经验的\"整机产品经理\"——这类人对方案可行性的判断直接决定产品成败，市场上极稀缺，只能靠内部培养、\"拼盘式\"团队组合补位。这也回扣了\"创造 > 生存\"里\"员工发展是主线\"的逻辑：核心稀缺能力买不到，只能在长链条业务里把人养出来。\n\n> 💡 **萃取：**专家最大的盲区是\"默认对方和我懂得一样多\"。把\"我觉得这很显然\"换成可验证的硬指标（如\"十人盲测七八人理解一致才放行\"），是把个人直觉变成组织可复制能力的关键一步。\n\n---\n\n## 九·五、科技 × 人文：在\"十字路口\"上做产品\n\n刘靖康指出影石天然站在\"科技与人文的十字路口\"：纯技术/参数不会给消费者更大启发，但没有好产品、只有玩法也不行——两者必须结合。\n\n> \"光靠参数跟技术创新，并不会给消费者带来更大的启发。但你没有个很好的产品、只有玩法，消费者也没有很好的体验。\" — 刘靖康\n\n他们最近在做的\"彩虹洒水器\"实验是绝佳例子：\n\n> \"我们在改造一个浇花的洒水器，它会根据你所在的经纬度、季节、日出时间，倒推什么时候洒水你能看到彩虹，然后把这个时间插到你手机日历里——到时候提醒你去看，你就会看到彩虹。\" — 刘靖康\n\n关键在于它**几乎不增加工程成本却创造巨大情绪价值**。背后是一个对\"纯艺术\"和\"纯效率\"两极的反思：\n\n> \"很多太艺术性的东西没有实用功能，就没法商业化、没法传播、没法让更多人看到；也有很多产品是纯效率型的，只评价效率、只评价性价比。但我们这个影像业务非常依赖技术作为基础——相机素质要做得很不错，可很多消费者不知道怎么拍、怎么找角度、怎么加特效，所以我们有大量创作者和外部合作开发各种玩法去启发他们。\" — 刘靖康\n\n影石恰好卡在\"科技与人文的十字路口\"中间，两者必须结合。大疆 Pocket3 的旋转屏、拍立得吐照片的仪式感，都属\"在有实用功能的前提下、几乎不增成本地附加巨大情绪价值\"这一类机会点。\n\n罗永浩借此复盘锤子科技的痛点——**创业公司在硬核功能上的资源约束**：\n\n> \"我的竞争对手配套一个 5000 人的团队里可能有 1000 人做影像，我们可能 1200 人团队里有七八十个人做影像。这不是我不想投入，是创业公司确实投入不起的。所以我们去花很多相对低成本实现、让用户感受很不一样的东西（大爆炸、One Step、无限屏）。\" — 罗永浩\n\n但这些\"花里胡哨/感性\"的东西常被误读为\"不务正业\"，尤其当硬核局限（如无限屏受陀螺仪漂移限制做不到纹丝不动）暴露时——\"那个时候讲都讲不了，甚至被当成我们不务正业\"。两人都推崇乔布斯式\"既实用、又瞬间击中共鸣\"（如滑动解锁）的罕见能力。\n\n刘靖康在这里主动给了罗永浩一段很真诚的\"养分论\"回应，也印证了他后面\"公司存在过的唯一意义=成为行业养分\"的终局判断：\n\n> \"可能像锤子不在了，但您的大爆炸、One Step、闪电胶囊，成为了很多手机后面创新的基础和启发。现在年轻消费者不一定记得最开始的功能是谁发明的，但客观讲，没有这些作为基础，就没有后面其他手机厂基于它的创新——所以从我们公司的角度看，它虽然不存在了，但还是留下了非常大的意义。\" — 刘靖康\n\n> 💡 **萃取：**资源受限时，与其在硬核功能上和巨头拼投入（必输），不如找\"几乎不增加成本却创造巨大情绪价值\"的小切口（彩虹洒水器、仪式感设计）。教育产品同理：在 AI 大厂拼算力/题库必败，但\"让学生有情绪价值/仪式感的小设计\"是低成本的差异化高地。\n\n---\n\n## 十、企业文化、心态与终局：创造 > 生存\n\n### 活泼但有内核：\"创造\"\n\n公司文化偏活泼玩闹（减肥奖惩：每周称重，未用药前提下增一斤罚 800、减一斤奖 500；1024 程序员节发黄金键帽，这个在工程师圈里流传很广），但他纠正说这些活泼只是表层，更准确的核心词是**创造**——连减肥奖惩本身也是\"创造了一个机制\"。其中\"黄金纸\"是个把\"创造\"思维用到员工激励上的妙招：\n\n> \"黄金是所有人价值认同的最大公约数。我们以前发周年纪念的纸、荣誉证书，很多人会扔掉，但做成黄金之后就不会扔。所以我们用一克金箔加纤维压到一起——既有黄金的触感和光泽，又有纸张的韧性。\" — 刘靖康\n\n（A4 版本约需六七克金，可直接进打印机打印；何同学曾用它折成锤子。）\n\n撒现金事故被他真诚反省：复式结构下楼上楼下撒钱、画面里员工弯腰抢钱观感差。\n\n> \"我撒之前特别强调两件事：第一不要挪动位置，第二千万不要弯腰——是为了大家都能拿到。但从视频拍摄角度看印象很不好，而且对很多人来讲情感上是受到伤害的，所以我也自己反省，现在就不撒钱了，改发红包。\" — 刘靖康\n\n罗永浩借此点出\"画面会说谎\"，并给了两个更聪明的替代方案：\n\n> \"搞影像搞多了你会发现，画面是可以 100% 误导的……楼上楼下撒钱给人不平等的暗示，很不好；其实有办法，一是老板跟着一起抢，二是让财务老大去发钱，这样就会弱化'资本家刷阶层感'的误读。\" — 罗永浩\n\n### 公开表达的边界：绝不公开批评大疆\n\n这个准则也是\"收到负反馈后动态调整边界\"的产物——他承认自己内在调皮、个性鲜明，早期会忍不住在朋友圈提及大疆，\"控制不住情绪\"，但意识到这会伤害好不容易积累的品牌形象。他对大疆的赞美是真心的：\n\n> \"大疆的强大比大部分人外在的理解要强大得多得多得多。\" — 刘靖康\n\n> \"今天的准则是：一定不会公开去讲大疆不好的东西。但我对大疆认可的部分是真实存在，我也不吝啬于表达——如果没有大疆开创消费无人机品类、提供行业基础，全景无人机品类也不会诞生。\" — 刘靖康\n\n罗永浩点破人性：冲突更易传播，\"大家只记得你讽刺过谁，连你由衷夸过的人自己都不记得\"。他举自己的亲历——米粉骂他总阴阳怪气小米，他去搜关键词才发现\"夸的一定过 2/3，讽刺的少，但他们只记得讽刺的那些\"。两人还点出一个更扎心的群众心理：\n\n> \"大家起哄架秧子的时候，你要有瓜我要吃，你没有瓜我想象出一个瓜来也要吃——大家对瓜的需求超过对大米的需求。\" — 罗永浩\n\n刘靖康的解法是\"待在'自己喜欢的方向'和'公众能接受的方向'的交集里\"——现在微博多是 love and peace、发狗头、晒最近学了什么、转抽（自嘲），签名是\"啥都不会，只会转抽\"。但他保留了一个不愿放弃的内核：\n\n> \"我属于创业者里相对年轻的，后半辈子还有很长时间，还是想多体验不同的事情，不想太压抑自己的表达。\" — 刘靖康\n\n### 终局判断：从\"造产品\"到\"造创业者\"\n\n这是全场最深的一段。刘靖康给出了一条比\"创造\"更底层的排序：\n\n> \"公司本身相比于生存，更应该关注：我们的起心动念是不是要去解决别人没解决的问题、去创造。但企业要持续良好地创造，很现实的一个问题是它得留在牌桌上。\" — 刘靖康\n\n> \"比创造更底层的 principle 是：你要解决别人没解决的问题，就一定在创造过程中开发了新知识……所以最应该关注的是员工的发展——新员工继承老知识、有一帮足够热情的人不断开发新知识。这个做好，就会创造客户价值，进而创造商业价值，股东回报一定不会差。\" — 刘靖康\n\n```mermaid\nflowchart TB\n    Found[\"创始人才敢 all in on nothing<br/>(资产是自己创造的)\"]\n    Prof[\"职业经理人 purpose<br/>= 保护资产<br/>(库克之后苹果创新↓)\"]\n    Found -.对比.-> Prof\n\n    Order[\"排序：创造 > 生存 > 股东回报<br/>(既要又要还要 但可兼容)\"]\n    Order --> Emp[\"主线 = 员工发展<br/>继承老知识+开发新知识\"]\n    Emp --> Cust[\"→ 创造客户价值\"]\n    Cust --> Biz[\"→ 创造商业价值\"]\n    Biz --> Share[\"→ 股东回报自然不差\"]\n\n    Order --> Exit[\"创始人终会离开<br/>新机制：公司=创业者孵化器<br/>鼓励员工'毕业'创业并投资\"]\n\n    style Found fill:#dcfce7,stroke:#16a34a\n    style Prof fill:#fee2e2,stroke:#dc2626\n    style Order fill:#fce7f3,stroke:#be185d,stroke-width:2px\n    style Emp fill:#dbeafe,stroke:#2563eb,stroke-width:2px\n    style Exit fill:#fce7f3,stroke:#be185d\n```\n\n他对\"成为老大后会不会作恶\"这个问题有清晰答案：先辈企业家因缺乏安全感、向外求评价，自然以\"维持领导地位\"为目标（如华为背负 20 万人家庭，只能做长坡厚雪的 second mover）；而他 1991 年生、家庭给了足够安全感，\"创造本身的成就感\"远大于收入或上市的喜悦。\n\n他还点出\"创始人才敢 all in on nothing\"的结构性原因，以及苹果案例里\"能力积累的继承性\"：\n\n> \"只有创始人才敢去做那种 all in on nothing 的角色，因为这个企业资产是他自己创造出来的，他可以全权决定。职业经理人被董事会任命，purpose 是保护企业和大家的资产，在大的取舍上没办法像创始人那样做。\" — 刘靖康\n\n> \"苹果发明 iPod 之前积累了 Macintosh 的操作系统，发明 iPhone 之前 iPod 积累了硬件设计和 iTunes 的流媒体生态——没有这些作为基础，就没有后面东西的诞生。\" — 刘靖康\n\n他强调\"创造也得赚钱\"，但赚钱是验证而非目的：\n\n> \"我们公司也非常关注商业化、效率和赚钱，因为只有你的东西赚钱，才能证明你的方向选对了、可靠、效率够高、消费者认可。\" — 刘靖康\n\n对\"我发明的品类最后可能被大疆笑到最后\"这件事，他给出了一个近乎企业生死观的自我建设命题：\n\n> \"有可能最后全景无人机这个品类是大疆笑到最后，但这个品类是我们发明的，最后可能由大疆去普及给更多的人、让更多人像鸟一样在天上飞……无论企业能否独领风骚、是否消亡，它创造的东西会变成行业的养分——这是一个公司存在过的、回过头看唯一的意义。\" — 刘靖康\n\n终局设想是把公司从\"造产品\"升级成\"造创业者 + 投资平台\"：\n\n> \"我作为创始人总有一天会离开。我在构思一个新机制：我们产出的除了相机产品，还可能创造另一个东西——创业者。公司是个长链条、不断开发新知识的链条，很多人在过程中得到横向全面的锻炼，能力强的人天性一定想做自己的事，所以一定会有很多人从我们公司毕业去创业。我们可以投资他们、partly 参与他们——经过综合锻炼的创业者成功概率更高，这部分也变成我们的股东价值。\" — 刘靖康\n\n这样既保住\"创造为先\"，又把创始人离场后创新会熄火的难题一并解了（\"我能想到一个好的 work around，就是它变成一个创业者成长的平台和投资平台\"）。\n\nslogan 的演变印证了\"准确\"原则：`life is short play more`（参考 Xbox，契合记录独特人生）→ `chase adventure`（匹配运动相机，但用户场景超出运动，\"很搞笑的小朋友视频最后跳出 chase adventure 怎么都不协调\"）→ 内部约 200 条提案中选定 **`think bold`**（概括创新基因 + 客户精神内核，带一点\"激进/勇敢/鲁莽\"，也是自我激励）。新 slogan 还在被合作伙伴反哺——与影视飓风、阿宇等创作者合作的广告里加了这句话，\"他们的故事本身也会反哺我们品牌的印象\"。\n\n> 💡 **萃取：**\"创造 > 生存 > 股东回报\"不是反商业，而是把因果链排对——把\"为股东赚钱\"当直接目标会逼出守成与作恶；把\"持续开发新知识/发展员工\"当主线，商业回报是优秀创造的自然结果。但这条链每一环都不能下牌桌，所以\"既要又要还要\"是真功夫而非鸡汤。\n\n---\n\n## 金句（嘉宾原话）\n\n> \"与其在别人设定的规则里面去玩，看自己能不能自己去设定规则。\" — 刘靖康\n\n> \"你对自我的评价体系，是来自于他人，还是来自于你跟事物打交道本身，这可能是一个比较关键的事情。\" — 刘靖康\n\n> \"我认为人是环境的产物，并不是说谁就比谁更特别、更有追求。\" — 刘靖康\n\n> \"那个时候就真的知道自己这次真的是做过了。\"（第一次见到父亲落泪）— 刘靖康\n\n> \"如果一个消费电子或硬件公司要成功，起码有一半，你说 49% 吧，功劳是跟供应商有关系的。\" — 刘靖康\n\n> \"持续不犯错的确是这个行业的一个隐性门槛。\" — 刘靖康\n\n> \"Don't rush your product to the market……硬件不像软件升级个 OTA 就行了。\" — 刘靖康\n\n> \"当一切都被 AI 平权，人类底层最终还是会通过真实的部分去证明自己独一无二的价值。\" — 刘靖康\n\n> \"今天 AI 在大批量地教育用户为软件付费……将来做硬件的公司，相当大部分收入可能来自软件。\" — 刘靖康\n\n> \"比创造更底层的 principle 是：你要解决别人没解决的问题，就一定在创造过程中开发了新知识。\" — 刘靖康\n\n> \"我们其实从来在外部跟内部都没有讲过要干死 GoPro 这种说法。\" — 刘靖康\n\n> \"可能全景无人机这个品类是大疆笑到最后，但这个品类是我们发明的……一个公司创造的东西，会变成行业的养分，这是它存在过的唯一意义。\" — 刘靖康\n\n> \"如果没了 400 万，可能毕业的时候就解散了。\" — 刘靖康（IDG 救命投资）\n\n> \"一个创业周期的本质，其实不是公司每年的收入利润是多少，而是你怎么样可以健康地发展你的能力站，使得你在每一个周期里都有机会变成最伟大的选手。\" — 刘靖康\n\n> \"你要看需求背后的需求。\"（马车→汽车→远程通信的无限游戏）— 刘靖康\n\n> \"有时危险不在于公司剩多少钱，而在于整个 momentum 一旦掉头，就容易兵败如山倒。\" — 刘靖康\n\n> \"原来合法合规的运营现代化的企业，有些事也跟黑帮差不多。\"（专利联盟）— 罗永浩\n\n> \"物质激励决定下限，热爱决定上限。\" — 刘靖康（上市没改变心态）\n\n---\n\n## 速记卡 · 最值得记住的 12 句\n\n1. 选赛道看\"哪条路起步就能拿到看得见的进步\"，而非\"我最想做什么\"——正反馈滚出能力。\n2. 把成就归因于\"环境给了我安全感\"而非\"我更优秀\"，决定你到顶后是继续创造还是守成。\n3. 最好的成长 = 在宽容环境里犯了不致命的错并吃到清晰负反馈；护栏的作用是挡掉毁灭性后果。\n4. 新技术不必然带来新场景；带动品类的是够大够刚、满足度高的 solid 场景，且要有人真赚到钱。\n5. 硬件护城河 = 长链条上持续不犯错；这是钱和聪明都难快速买到的隐形能力。\n6. 供应链是耦合问题（可制造性/能力评估/质量管理/二级供应商），不是单一部门能补救的。\n7. 产品能否成为用户的\"社交货币\"，决定它能否自传播——值得主动设计。\n8. 巨头补贴硬件、把别人挤出场，常把产业做小而非做大；健康生态需要多家分别打磨 PMF。\n9. AI 平权后差异化回流到\"无法生成的真实\"——真实性是新的稀缺资源与溢价来源。\n10. 排序\"创造 > 生存 > 股东回报\"把因果链排对：以员工/新知识为主线，商业回报是自然结果。\n11. 新业务看\"是否牵引能力站升维 + 与已有能力有继承性\"，而非只看它自己的收入利润。\n12. 成长型公司的生死指标常是 momentum（势能掉头）而非现金余额；专利筹码靠订单/联盟而非硬扛。\n\n---\n\n## 可复用检查清单\n\n### 新硬件/新品类/新业务方向自检\n- [ ] 有没有一个\"够大、够刚、满足度够高、完成度够高\"的 solid 场景？还是只有炫技？\n- [ ] 这个场景里\"有人真的赚到钱了\"吗？（没人赚钱的生态长不大）\n- [ ] 这个形态天然服务哪个需求（记录/分享/创作…）？别默认\"更全/更先进=更好\"。\n- [ ] 顺着\"需求背后的需求\"追问 2-3 层，更本质的解是不是另一个形态（马车→汽车）？\n- [ ] 这个业务是否牵引核心能力站升维？与已有能力有没有继承性（可复用到未来品类）？\n- [ ] 它会成为用户的\"社交货币\"吗？能否自传播？\n- [ ] 长链条上我哪一环最可能犯大错？是否做了\"持续不犯错\"的机制（如盲测、驻厂、试产线）？\n- [ ] 是不是健康生态（多家共建），还是靠一家补贴把别人挤出场（易把产业做小）？\n- [ ] 全球化后专利筹码够吗？（订单量/供应链/联盟）当成运营成本提前布局，而非临阵硬扛。\n\n### AI 冲击下的产品价值自检\n- [ ] 我的产品满足的是记录 / 分享 / 创作 中的哪个需求？AI 对它是替代还是丰富？\n- [ ] AI 把\"下限\"拉高后，用户的差异化/比拼会回流到哪个\"真实/过程/亲历\"上？我守住了吗？\n- [ ] AI 改变的是需求面还是产品形态？我的形态会不会被\"部分实拍+AI补全\"反噬？\n- [ ] 我能不能借 AI\"教育用户为软件付费\"的窗口，把收入结构从硬件迁一部分到软件？\n\n### 组织与个人成长自检\n- [ ] 我（或团队成员）的自我评价是向外求认可，还是来自与事物打交道本身？\n- [ ] 我给新人设计的是\"起步就有正反馈\"的 learning curve 吗？\n- [ ] 犯错时，环境是否挡住了毁灭性后果、同时让人完整承受了教训？\n- [ ] 团队是否陷入\"知识的诅咒\"？有没有把直觉变成可验证硬指标（盲测七八人通过）？\n- [ ] 公司目标排序是\"为股东赚钱\"在前，还是\"开发新知识/发展员工\"在前？\n\n---\n\n## 关联\n- [[01_李想_25年创业之路]] — 同为硬件长链条创业者的心态与终局对照（理想 vs 影石）\n- [[团队AI能力提升主页]] — \"贴近 + 端到端重做\"两步法、\"整机型人才\"稀缺\n- [[5维销售素材包/主讲IP项目]] — \"真实是新稀缺资源\"对名师 IP 差异化的支撑\n- [[136_全球大模型季报第9集]] — \"AI 教育用户为软件付费\"与广密\"Token usage 范式\"呼应\n- 关联 TODO：与历史\"硬件供应链/出海/AI 对内容行业冲击\"主题笔记互链；待补 [[知识的诅咒]] [[社交货币]] 概念条目（如 wiki 已有）"}, {"id": "01_李想_25年创业之路", "num": "01", "name": "李想 · 25年创业之路", "theme": "", "guest": "李想、罗永浩", "issue": "01（首期）", "duration": "03:56:37", "cat_key": "core", "cat_idx": "一", "cat_title": "直指核心战役", "cat_sub": "AI · 创业 · 管理", "cat_color": "#ff6a3d", "rank": 3, "reason": "三共性论（选得准+选得长+高频迭代）/ 每天三件事 / 越难越要告诉团队——含金量最高的管理底层。", "md": "## 总结卡片\n\n![[李想专访_纪要封面.png]]\n\n> 上图为钉钉 AI 听记生成的\"理想汽车的信仰与远征\"可视化纪要。\n> 合并稿（含纪要+逐字稿）：[罗永浩的十字路口_李想专访_25年创业之路](../../../raw/播客/罗永浩的十字路口_李想专访_25年创业之路.md)\n\n---\n\n## 一句话总结\n\n李想给出 25 年创业心法的内核只有三句：\n1. **三共性论**：所有卓越企业的共性是 **选得准 + 选得长 + 高频迭代**——前两条所有人都讲，但 **第三条最反人性**（在一个长周期赛道里保持极高迭代频率）。\n2. **每天三件事**：高一时已经摸索出\"只做今天最重要的三件事，其余删掉\"，后来在《高效能人士的七个习惯》里看到系统化的表达。\n3. **越难越要告诉团队**：人生最大的转变发生在 2008 年——他原本死扛、不让团队知道困难；天使投资人一句\"小股东被你冷落了\"让他明白：**人都希望被需要，越难越要让团队参与**。\n\n底层信念：\"**只要你做正确的事、好的事，就会有好的结果。**\" ——来自姥姥姥爷无求回报地帮邻居的耳濡目染。\n\n---\n\n## 整体地图\n\n```mermaid\nflowchart TB\n    Origin[\"姥姥姥爷的正向影响<br/>'做对的事终有回报'\"]\n    Origin --> Childhood[\"7→18 岁<br/>父母开明 / FC约定 / 月零花钱<br/>初三 8000 元 PC\"]\n    Childhood --> Stage1[\"18-32 岁<br/>泡泡网 / 汽车之家\"]\n    Stage1 --> S1A[\"18 岁月入 2 万\"]\n    Stage1 --> S1B[\"2008 经济危机<br/>+ 小股东逼宫\"]\n    Stage1 --> S1C[\"2013 上市前狙击<br/>优先回购化解\"]\n    Stage1 --> Stage2[\"32+ 岁<br/>理想汽车\"]\n    Stage2 --> S2A[\"2014 Model S<br/>选增程式（反共识）\"]\n    Stage2 --> S2B[\"L9 / Mega / I8<br/>+ 三次黑公关\"]\n    Stage2 --> S2C[\"VLA + AI 司机<br/>5万GPU / 60亿/年\"]\n\n    Origin -.-> Mindset[\"心法层\"]\n    Stage1 -.-> Mindset\n    Stage2 -.-> Mindset\n    Mindset --> M1[\"三共性论<br/>选得准+选得长+高频迭代\"]\n    Mindset --> M2[\"每天只做三件事\"]\n    Mindset --> M3[\"越难越告诉团队\"]\n    Mindset --> M4[\"吵架=认知碰撞\"]\n\n    style Mindset fill:#fef3c7,stroke:#d97706\n    style M1 fill:#dcfce7,stroke:#16a34a,stroke-width:2px\n```\n\n---\n\n## 一、被低估的童年：正向留守儿童的样本\n\n> 7 个月到 7 岁在沧州由姥姥姥爷抚养，两位都是离休军人。\"村里所有问题都来找我姥爷解决，他们帮人不求回报。\"\n\n最关键的反馈：姥姥 80 岁过生日时，被她帮过的所有人都来祝寿。这成了李想长期的精神底座——\n\n> **\"你只要去做你认为对的事、好的事，就有好的结果。\"**\n\n🧠 **反常识**：现代教育理念认为隔代抚养有风险。但李想是反例——**稳定的情感支持 + 高道德示范的隔代抚养可以彻底反向**。\n\n### 父母的两个细节决定了他\n\n- **FC 游戏机约定**：父亲跟李想商量\"每天玩多久\"——李想自己定两小时，父亲严格执行。**不蛮横，而是协商；用相互尊重换自律**。\n- **零花钱按月给**：一个月 30 元随便花，\"花光了不要找我要\"。三天花光后母亲一个月没给——李想从此学会管钱、攒钱、并很快开始倒卖漫画书（1.9 元 → 批发市场 1.2 元 → 班里 1.5–1.6 卖出）。\n\n---\n\n## 二、泡泡网/汽车之家：商业第一性原理\n\n### 关键时间锚点\n\n| 年份 | 节点 |\n|---|---|\n| 初三毕业 | 父亲 1/3 存款（8000 元）买 PC |\n| 1997-98 | 显卡之家上线，整个暑假在电脑城装机（销冠） |\n| 高一 | 5000 字稿件被《大众软件》整版发表，**500 元稿费** |\n| 高三 | 月收入 2 万（≈ 父母 10 倍） |\n| 2000 春节 | 离开石家庄到北京（三个合伙人只有他来） |\n| 2005 | 24 岁身家过亿 |\n| 2006 | 招 CFO 李铁 |\n| 2008 | 小股东逼宫 |\n| 2013.12 | 汽车之家纽交所 IPO（发行价 13，开盘 30+） |\n\n### 关键判断方法\n\n> **\"我从来不做前期调研。\"**\n\n李想的方法：\n1. **看一个领域最大的问题是什么**——做汽车之家前看到汽车媒体最大问题是\"卖方市场+所有内容都不真实\"。\n2. **在用户视角重新定义信息**——别人写\"车内空间 1820 mm\"，汽车之家写\"前排座椅前面还有几拳；杯架能放可乐还是只能放脉动\"。\n\n### 反共识的\"做汽车\"决定（2014.4.23）\n\n那天马斯克本人把 Model S P85 交付给他，一开就觉得\"这就是我想要的\"。\n\n#### 落地选择题（不是对错题）\n\n| 选项 | 否决理由 |\n|---|---|\n| 房地产 | 每个城市完全不一样，没产品力可言 |\n| 旅游 | 是服务业 |\n| **汽车** | **标品**——李想团队做标品特别强 |\n\n#### 必须做增程式的两个原因\n1. **里程焦虑真实存在**：开 Model S 去古北水镇遇到充电桩坏掉，回家时仅靠下坡才到\n2. **必须降价**：Model S P85 卖 100 多万但乘坐空间相当于宝马 3 系\n\n#### 怎么说服反对增程的合伙人\n> \"**有点连哄带骗**\"——抓住\"日产 E-Power 在日本销量超过普锐斯\"这个市场已验证的锚点。\n\n---\n\n## 三、组织建设：从独裁暴君到吵架共识\n\n### 第一次大危机：90% 员工一天集体辞职\n\n时间：泡泡网早期，30-40 人规模。\n\n> **\"完全没有人情味，只关注事，完全不关注人。就是个独裁的暴君。\"**\n\n应对：一边手忙脚乱招人；一边真的去读管理书（德鲁克）；**学会\"一起吃饭\"**——晚上叫人一起吃中关村盖饭，\"这么着他们就能跟你讲讲话了\"。\n\n### 第二次大危机：2008 经济危机 + 小股东逼宫\n\n故事戏剧性极高：\n- 三个小股东（含合伙人）在茶馆开股东会，逼李想和樊铮交出公司\n- 主谋两天前刚找李想借走 100 万买房（李想卡里从 105 万 → 5 万）\n- **天使投资人拍桌怒斥**：\"你们三个小王八蛋，谁出的主意？放在古代要满门抄斩\"\n- 三人立刻互相推诿，事件平息\n\n李想后来跟主谋长谈，对方说了让他**人生最大转变**的一句话：\n\n> **\"你老一个人死扛——我们最大感觉就是你觉得我们不重要了。原来你都跟我们商量，最难的时候你一个人死扛，我们想帮你也帮不了，就觉得自己在这家公司不重要了。\"**\n\n李想从此变了两件事：\n1. **越难的事越告诉团队**\n2. **对自己好一点**——之前自己开 Polo 而合伙人开宝马 5 系，\"**一个从来不吃糖的人是不可能给别人甜头的**\"\n\n### 第三次大危机：2013 上市前夜被狙击\n\n2013.9 月底确定 10 月初赴美 IPO，国庆前两天通知团队。第二天最大竞争对手以 **19 元/股**（发行价 13 元）收购股东 6% 股份阻止 IPO。\n因合作条款\"95% 股东同意才能上市\" → **行使优先回购权**内部买下。IPO 推迟一年，2013.12.11 终于上市，开盘 30+。\n\n### 组织哲学：吵架 = 认知碰撞\n\n> \"我们这种吵架的方式会把每个人认知都掏出来。**很多时候我们做不同选择是因为认知不同，每个人认知都抛出来时，是很容易做相同选择的。**\"\n>\n> \"你的计数模型和他的计数模型不一样，但合并成大模型后，**reasoning 的结果自然就一样了**。\"\n\n🧠 **个人启发**：把\"团队争吵\"看作 LLM 的\"上下文合并 → 推理\"。**沉默的会议室不是稳定，是低带宽**。\n\n### 招人哲学\n\n- **18 级以上的人李想亲自面试**——这是他对 AI、芯片、操作系统等领域的认知来源\n- 关键早期合伙人 **马东辉**（三一重工研究院院长）：\n  - 标准：\"**技术出身的运营者**——做过端到端交付的大项目管理\"\n  - 待遇：\"**给我一个月 2 万够生活就可以**\"\n  - 真心追求：\"**希望我做的产品身边的朋友街上到处都是**\"\n  - 现在管理 3.2 万人（理想总员工 3.4 万）\n\n---\n\n## 四、Mega 危机：黑公关时代的应对范本\n\n### 被黑的特殊性\n\n- **首月 3000 辆 → 跌到 500–1000 辆/月**\n- 用棺材做文章，传统车企脏活\n- 背后是 **\"社交+流量+算法\"三件套**——把人性的负面放大\n\n### 李想的复盘（最值得学习的部分）\n\n**他不甩锅给黑公关，而是公开自我反省**：\n\n1. **内饰直接搬 L 系列** → 用户感觉\"更贵了应该有新东西\"\n2. **充电网络太差**（200-300 站）→ MPV 用户家里有司机，需要外充\n3. **定价比心理预期高**\n\n应对措施（4 个月落地）：\n- 旋转座椅（不只是功能，是**态度表达**）\n- 老用户花钱可升级 Home 版\n- **降价 3 万至 52.98 万，老车主全部退 3 万**\n- 自建超充网络从 200-300 站 → **3000+ 站**（北京三公里一个）\n\n### 公关哲学\n\n> \"**只要硬的东西挺得住，这些其实就是一阵烟。**\"\n>\n> \"**有的时候我们没招——今天这个世界是个算法机制。**\"\n>\n> \"你解决不了，但跟原来也不一样——**它不会让你致死，伤害其实有限**。有新的热点的时候，流量又去追新的热点了。\"\n\n数据：**截至 2024.6，北京 50 万元以上 MPV 市场 Mega 占 70%**，超越奔驰 V-Class、丰田 Alphard。\n\n---\n\n## 五、心法系统\n\n### 卓越企业家的三共性（这部分最值得反复读）\n\n> \"**第一选得准，第二选得长，第三高频迭代——第三是反人性的。**\"\n\n| 共性 | 难度 | 谁会讲 |\n|---|---|---|\n| **选得准** | 中等 | 所有人都会说\"选择比努力重要\" |\n| **选得长** | 中等 | 所有人都会说\"跟时间做朋友\" |\n| **高频迭代** | **极反人性** | 几乎没人讲 |\n\n> \"**前两个对了之后，所有人都会说'我要追求完美'或'我要更有耐心'——错了，这帮人是在选了一个很长周期的赛道里以极高频率做迭代。**\"\n\n### 案例佐证\n\n| 公司/人 | 高频迭代的体现 |\n|---|---|\n| **黄仁勋/英伟达** | 显卡一年一代（对手 3 年一代）→ 把巫毒全干掉 |\n| **CUDA** | 迭代十几个版本才成功 |\n| **美团** | 极高频率调整运营策略 |\n| **字节** | 几十个产品版本同时迭代 |\n| **AI 强化学习** | 模型核心范式就是高频迭代 |\n\n类比 AI 训练：\n- **预训练 = 读书上课**\n- **后训练 = 有经验师傅带**\n- **强化训练 = 真实市场反馈**\n- 人类成长的关键是**强化训练的频次**\n\n### 每天只做三件事（从高一开始的习惯）\n\n> \"高中要上课，时间不够。我每天写今天的事，打出来排序，**把前三个留下，后边事全删掉，只做绝对必要的**。\"\n\n直到后来读《高效能人士的七个习惯》：主动积极 / 以终为始 / 要事第一 —— **才发现\"我原来一直在做的，是有系统化框架的\"**。\n\n### 压力管理\n\n> \"**我遇到巨大痛苦的事，可能别人快活不下去的事，我基本上三天就过去。第一天痛不欲生，第二天慢慢消化，第三天该怎么过怎么过。**\"\n\n为什么不焦虑：\n> \"**我创业的时候就一定知道一件事——我压根没有退路。当你知道没有退路的时候，反而就不用担心了。**\"\n\n🧠 **个人启发**：**焦虑很多时候不是来自\"没有退路\"，而是来自\"还有退路所以可以反复权衡\"**。\n\n---\n\n## 六、技术战略：VLA + AI 司机\n\n### VLA 的五项指标（用人的标准衡量 AI）\n\n李想拒绝用传统\"L1-L5\"自动驾驶标准，而是用**职业司机的 5 项能力**：\n1. **选路** / 2. **控速** / 3. **平顺** / 4. **安全** / 5. **交互**\n\n🧠 这是非常李想式的产品思维——**不是用技术指标，而是用人能感知的体验维度**。\n\n### 强化训练的\"双引擎\"\n\n- **重建技术**：把真实物理世界还原成可训练环境\n- **生成技术**：把没穷举到的场景生成出来\n\n资源投入：**5 万张等效 GPU + 60+ 亿/年研发**。关键人才挖自 NVIDIA Cosmos 团队。\n\n### 对 AGI 五阶段的看法（认同 OpenAI 划分）\n\n| 阶段 | 形态 | 李想的比喻 |\n|---|---|---|\n| 1 Chatbot | 聊天 | \"互联网的 AOL 阶段 / 手机的塞班阶段\" |\n| 2 Reasoning | 推理者 | 能力增强（仍是工具） |\n| 3 Agents | 智能体 | **iPhone 时刻** = 他变成你的同事 |\n| 4 创新者 | — | — |\n| 5 组织者 | 终极 Jarvis | **他变成你的家人**，延续你的智慧 |\n\n### 人类还能赢吗？\n\n> \"**我们这个星球文明发展靠的是智慧——人不是跑得最快的。希腊三杰、孔子老子、王阳明——人类智慧已经很长时间没大发展了。**\"\n>\n> \"**唯一的机会是 AI 倒逼人类的智慧发生一次显著跃迁。**\"\n\n---\n\n## 七、家庭与价值观\n\n### 信任建立 = 高要求的前提（最深刻的洞察之一）\n\n来自李想研究 Jonathan Ive 写 Steve Jobs 而非传记的视角：\n\n> \"**很多人拿乔布斯早期的粗暴举例——但从乔纳森那里看到的，其实是一帮人怎么在建立信任以后的高要求，而不是简单粗暴。**\"\n>\n> \"我们年轻时比较傻，就简单学着简单粗暴。其实不是——是**先建立了信任、高要求**，甚至那些脾气也是建立在信任基础上的'高要求'。\"\n>\n> \"**如果没有建立信任，做的很多东西其实就是简单粗暴。这是根本性的不同。他会在信任上花很多时间——这是被很多人忽视的，否则会学出问题的。**\"\n\n🧠 **强烈个人启发**：这条直接适用于团队管理。\"乔布斯式严苛\"的真正可复制部分是**前面那段被忽略的\"信任建立投资\"**——脾气只是高要求的副产品，不是核心方法。\n\n### 家庭哲学\n\n- 2008 年领证（27 岁），4 个孩子\n- 在家里所有事 100% 听老婆的\n- \"**我需要她远远超过了她需要我**\"——明确告诉妻子，并且这是事实\n\n---\n\n## 关键时间线速查\n\n| 年份 | 节点 |\n|---|---|\n| 1981 | 出生 |\n| 1981-88 | 沧州姥姥姥爷家 |\n| 1988 | 回石家庄上小学 |\n| 1996 | 初三毕业，父亲买 8000 元 PC |\n| 1998 | 高三月入 2 万，与樊铮合伙做泡泡网 |\n| 2000 春节 | 独自来北京 |\n| 2005 | 24 岁身家过亿 |\n| 2008 | 经济危机+小股东逼宫，认识老婆 |\n| 2013.12.11 | 汽车之家纽交所 IPO |\n| 2014.4.23 | 马斯克交付 Model S |\n| 2015 | 理想汽车成立 |\n| 2019 | 理想 ONE 上市（生命周期 20 万辆，100 亿美金）|\n| 2022 | L9 上市 |\n| 2024 春节 | Mega 上市危机 |\n| 2025-26 | VLA + 5 万 GPU + 60 亿/年；准备出海 |\n\n---\n\n## 关键人物速查\n\n| 人物 | 关系 | 关键细节 |\n|---|---|---|\n| 樊铮 | 泡泡网联合创始人 | 石家庄技术；理想汽车合伙人；\"话不多但特别准\" |\n| 秦致 | 汽车之家 CEO | 2006 加入 |\n| 李铁 | CFO | 2006 加入泡泡网，至今近 20 年 |\n| 马东辉 | 理想总裁 | 2015 加入，2 万月薪起步，现管 3.2 万人 |\n| 雷军 | 同辈 | 宣布造车前打过近 2 小时电话；李想建议\"自己 all in\" |\n| 罗永浩 | 主持人 | 三辆理想车主 |\n\n---\n\n## 关联\n\n- [[188_字节跳动与短视频大战]] —— 同样关于\"组织能力如何决定结局\"\n- [[171_微信与游戏_企鹅帝国的两大支柱]] —— 张小龙\"少做、做对、做透\" vs 李想\"高频迭代\"\n- [[136_全球大模型季报第9集]] —— AI 强化训练范式（李想直接拿来类比公司运营迭代）\n- [[三件事构建个人成长飞轮]] —— 姜胡说的\"每天三件事\"与李想的\"每天三件事\"\n- [[165_年报季中的真实中国2026]] —— 中国制造业升级背景下的硬件创业"}, {"id": "04_梁建章_创新人口与携程之路", "num": "04", "name": "梁建章 · 创新人口与携程之路", "theme": "创新、人口与携程之路", "guest": "梁建章、罗永浩", "issue": "04", "duration": "03:39:44", "cat_key": "core", "cat_idx": "一", "cat_title": "直指核心战役", "cat_sub": "AI · 创业 · 管理", "cat_color": "#ff6a3d", "rank": 4, "reason": "把学术方法论灌进商业（AB 实验）、服务工业化；人口→创新→国力闭环，含 AI 时代教育意涵。", "md": "## 一句话总结\n\n一个\"快人三岁\"的少年天才，把学术方法论灌进商业（远程办公 AB 实验）、又把商业资源灌进学术（用携程数据发顶刊），最终用一套\"人口→创新→国力\"的闭环逻辑，把企业家身份升级
